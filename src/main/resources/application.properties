## Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

## ===============================
## JWT Configuration
## ===============================
jwt.secret=NTFurnitureSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm
jwt.expiration=86400000
jwt.refresh-expiration=604800000

## ===============================
## App Configuration
## ===============================
app.base-url=http://localhost:8386

## Enable async for email sending
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5

## ===============================
## PayOS Configuration
## ===============================
payos.client-id=${PAYTOS_CLIENT_ID}
payos.api-key=${PAYTOS_API_KEY}
payos.checksum-key=${PAYTOS_CHECKSUM_KEY}
payos.return-url=http://localhost:8386/payment/payos/return
payos.cancel-url=http://localhost:8386/payment/payos/cancel
# Thời gian hết hạn link thanh toán (giây). Mặc định 600 giây = 10 phút
payos.expiry-seconds=600
