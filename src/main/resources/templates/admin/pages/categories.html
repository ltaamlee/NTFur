<th:block th:fragment="page-content">
    <th:block th:with="title='Quản lý danh mục', pageTitle='Quản lý danh mục', activePage='categories'">

    <!-- Page Header -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6">
        <div>
            <h2 class="text-2xl font-display font-bold text-primary-800">Danh sách danh mục</h2>
            <p class="text-primary-500 mt-1">Quản lý danh mục và phân loại sản phẩm</p>
        </div>
        <button onclick="openCreateModal()" class="mt-4 md:mt-0 px-6 py-2.5 btn-primary text-white rounded-lg font-medium flex items-center">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Thêm danh mục
        </button>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-2xl p-4 mb-6 card-shadow border border-primary-100">
        <div class="flex flex-col md:flex-row md:items-center gap-4">
            <div class="flex-1 relative">
                <input type="text" id="searchInput" placeholder="Tìm kiếm danh mục..." 
                    class="w-full pl-10 pr-4 py-2 border border-primary-200 rounded-lg text-sm focus:border-primary-500">
                <svg class="w-5 h-5 text-primary-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </div>
            <select id="filterStatus" class="px-4 py-2 border border-primary-200 rounded-lg text-sm focus:border-primary-500">
                <option value="">Tất cả trạng thái</option>
                <option value="ACTIVE">Hoạt động</option>
                <option value="INACTIVE">Không hoạt động</option>
            </select>
        </div>
    </div>

    <!-- Categories Table -->
    <div class="bg-white rounded-2xl card-shadow border border-primary-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full" id="categoriesTableSortable">
                <thead>
                    <tr class="table-header">
                        <th class="px-6 py-4 text-left text-xs font-semibold text-primary-700 uppercase tracking-wider cursor-pointer hover:bg-primary-50" data-sortable data-sort="name" data-default-sort="asc">
                            <span class="flex items-center">
                                Tên danh mục
                                <svg class="w-4 h-4 ml-1 sort-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
                                </svg>
                            </span>
                        </th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-primary-700 uppercase tracking-wider cursor-pointer hover:bg-primary-50" data-sortable data-sort="description">
                            <span class="flex items-center">
                                Mô tả
                                <svg class="w-4 h-4 ml-1 sort-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
                                </svg>
                            </span>
                        </th>
                        <th class="px-6 py-4 text-center text-xs font-semibold text-primary-700 uppercase tracking-wider cursor-pointer hover:bg-primary-50" data-sortable data-sort="displayOrder">
                            <span class="flex items-center justify-center">
                                Thứ tự
                                <svg class="w-4 h-4 ml-1 sort-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
                                </svg>
                            </span>
                        </th>
                        <th class="px-6 py-4 text-center text-xs font-semibold text-primary-700 uppercase tracking-wider cursor-pointer hover:bg-primary-50" data-sortable data-sort="productCount">
                            <span class="flex items-center justify-center">
                                Sản phẩm
                                <svg class="w-4 h-4 ml-1 sort-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
                                </svg>
                            </span>
                        </th>
                        <th class="px-6 py-4 text-center text-xs font-semibold text-primary-700 uppercase tracking-wider cursor-pointer hover:bg-primary-50" data-sortable data-sort="status">
                            <span class="flex items-center justify-center">
                                Trạng thái
                                <svg class="w-4 h-4 ml-1 sort-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
                                </svg>
                            </span>
                        </th>
                        <th class="px-6 py-4 text-center text-xs font-semibold text-primary-700 uppercase tracking-wider">
                            Hành động
                        </th>
                    </tr>
                </thead>
                <tbody id="categoriesTable">
                    <tr>
                        <td colspan="6" class="px-6 py-12 text-center text-primary-500">Đang tải dữ liệu...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="formModal" class="fixed inset-0 z-50 hidden overflow-y-auto">
        <div class="modal-backdrop absolute inset-0 bg-black/50" onclick="closeFormModal()"></div>
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="modal-content relative bg-white rounded-2xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto my-auto">
                <div class="sticky top-0 bg-white border-b border-primary-100 px-6 py-4 flex items-center justify-between z-10 rounded-t-2xl">
                    <h3 class="text-xl font-display font-semibold text-primary-800" id="modalTitle">Thêm danh mục mới</h3>
                    <button onclick="closeFormModal()" class="p-2 text-primary-400 hover:text-primary-600 rounded-lg hover:bg-primary-50">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <form id="categoryForm" class="p-6">
                    <input type="hidden" id="categoryId">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Tên danh mục <span class="text-red-500">*</span></label>
                            <input type="text" id="categoryName" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500" placeholder="VD: Ghế sofa" required>
                            <p class="text-red-500 text-xs mt-1 hidden" id="nameError">Tên danh mục không được để trống</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Slug</label>
                            <input type="text" id="categorySlug" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500 bg-primary-50" placeholder="tu-dong-tao-tu-ten" readonly>
                            <p class="text-xs text-primary-400 mt-1">Được tự động tạo từ tên</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Mô tả</label>
                            <textarea id="categoryDescription" rows="3" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500" placeholder="Mô tả ngắn về danh mục..."></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Hình ảnh danh mục</label>
                            <div class="border-2 border-dashed border-primary-200 rounded-xl p-4 text-center hover:border-primary-400 transition-colors cursor-pointer" onclick="document.getElementById('categoryImageInput').click()">
                                <div id="categoryImagePreview" class="hidden mb-3">
                                    <img id="categoryImagePreviewImg" class="w-24 h-24 mx-auto object-cover rounded-xl">
                                </div>
                                <div id="categoryImagePlaceholder">
                                    <svg class="w-10 h-10 mx-auto text-primary-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                    </svg>
                                    <p class="text-primary-600 font-medium text-sm">Click để tải lên hình ảnh</p>
                                    <p class="text-xs text-primary-400 mt-1">Hỗ trợ: JPG, PNG, GIF (tối đa 5MB)</p>
                                </div>
                            </div>
                            <input type="file" id="categoryImageInput" class="hidden" accept="image/*" onchange="handleCategoryImageUpload(event)">
                            <button type="button" id="removeCategoryImageBtn" class="hidden mt-2 text-sm text-red-600 hover:text-red-800" onclick="removeCategoryImage()">Xóa hình ảnh</button>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Thứ tự hiển thị</label>
                            <input type="number" id="categoryOrder" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500" value="0" min="0">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Trạng thái</label>
                            <select id="categoryStatus" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500">
                                <option value="ACTIVE">Hoạt động</option>
                                <option value="INACTIVE">Không hoạt động</option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end space-x-3">
                        <button type="button" onclick="closeFormModal()" class="px-6 py-2 border border-primary-300 text-primary-700 rounded-lg hover:bg-primary-50 font-medium transition-colors">Hủy bỏ</button>
                        <button type="submit" class="px-6 py-2 btn-primary text-white rounded-lg font-medium">Lưu</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let categories = [];
        let categoryImage = null;
        let currentSort = { field: 'name', direction: 'asc' };

        async function loadCategories() {
            try {
                const response = await apiCall('/api/admin/categories');
                if (response.success) {
                    categories = response.data;
                    renderCategories();
                }
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        function handleCategoryImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (file.size > 5 * 1024 * 1024) {
                showToast('Kích thước file quá lớn (tối đa 5MB)', 'error');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                categoryImage = e.target.result;
                document.getElementById('categoryImagePreviewImg').src = categoryImage;
                document.getElementById('categoryImagePreview').classList.remove('hidden');
                document.getElementById('categoryImagePlaceholder').classList.add('hidden');
                document.getElementById('removeCategoryImageBtn').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function removeCategoryImage() {
            categoryImage = null;
            document.getElementById('categoryImageInput').value = '';
            document.getElementById('categoryImagePreview').classList.add('hidden');
            document.getElementById('categoryImagePlaceholder').classList.remove('hidden');
            document.getElementById('removeCategoryImageBtn').classList.add('hidden');
        }

        function sortCategories(field, direction) {
            categories.sort((a, b) => {
                let valA = a[field];
                let valB = b[field];
                
                if (valA == null) valA = '';
                if (valB == null) valB = '';
                
                if (typeof valA === 'string') {
                    valA = valA.toLowerCase();
                    valB = valB.toLowerCase();
                }
                
                if (direction === 'asc') {
                    return valA < valB ? -1 : (valA > valB ? 1 : 0);
                } else {
                    return valA > valB ? -1 : (valA < valB ? 1 : 0);
                }
            });
        }

        function renderCategories() {
            const tbody = document.getElementById('categoriesTable');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('filterStatus').value;
            
            let filtered = categories.filter(c => {
                const matchSearch = !search || 
                    c.name.toLowerCase().includes(search) ||
                    (c.description && c.description.toLowerCase().includes(search));
                const matchStatus = !statusFilter || c.status === statusFilter;
                return matchSearch && matchStatus;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-12 text-center text-primary-500">Không tìm thấy danh mục nào</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(category => `
                <tr class="table-row border-b border-primary-100 hover:bg-primary-50/50">
                    <td class="px-6 py-4">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-lg overflow-hidden bg-gradient-to-br from-primary-400 to-secondary-400 flex items-center justify-center flex-shrink-0 mr-3">
                                ${category.imageUrl 
                                    ? `<img src="${category.imageUrl}" alt="${category.name}" class="w-full h-full object-cover">`
                                    : `<span class="text-white font-bold text-sm">${category.name.charAt(0).toUpperCase()}</span>`
                                }
                            </div>
                            <div>
                                <p class="font-medium text-primary-800">${category.name}</p>
                                <p class="text-xs text-primary-400">${category.slug || '-'}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <p class="text-sm text-primary-600 line-clamp-2">${category.description || 'Không có mô tả'}</p>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="text-sm font-medium text-primary-700">${category.displayOrder || 0}</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="text-sm font-medium text-primary-700">${category.productCount || 0}</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        ${category.status === 'ACTIVE' 
                            ? '<span class="status-badge bg-green-100 text-green-700">Hoạt động</span>'
                            : '<span class="status-badge bg-gray-100 text-gray-600">Không hoạt động</span>'
                        }
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex items-center justify-center space-x-2">
                            <button onclick="editCategory(${category.id})" class="p-2 text-primary-600 hover:bg-primary-50 rounded-lg" title="Chỉnh sửa">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                </svg>
                            </button>
                            <button onclick="deleteCategory(${category.id})" class="p-2 text-red-600 hover:bg-red-50 rounded-lg" title="Xóa">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
            
            updateSortIcons();
        }

        function updateSortIcons() {
            document.querySelectorAll('#categoriesTableSortable th[data-sortable]').forEach(th => {
                const field = th.dataset.sort;
                const icon = th.querySelector('.sort-icon');
                if (!icon) return;
                
                if (currentSort.field === field) {
                    icon.innerHTML = currentSort.direction === 'asc' 
                        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>'
                        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>';
                    th.classList.add('text-primary-600');
                } else {
                    icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>';
                    th.classList.remove('text-primary-600');
                }
            });
        }

        function handleSort(field) {
            if (currentSort.field === field) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.field = field;
                currentSort.direction = 'asc';
            }
            sortCategories(field, currentSort.direction);
            renderCategories();
        }

        function openCreateModal() {
            document.getElementById('modalTitle').textContent = 'Thêm danh mục mới';
            document.getElementById('categoryForm').reset();
            document.getElementById('categoryId').value = '';
            document.getElementById('categoryOrder').value = categories.length;
            removeCategoryImage();
            clearErrors();
            document.getElementById('formModal').classList.remove('hidden');
        }

        function editCategory(id) {
            const category = categories.find(c => c.id === id);
            if (!category) return;

            document.getElementById('modalTitle').textContent = 'Chỉnh sửa danh mục';
            document.getElementById('categoryId').value = category.id;
            document.getElementById('categoryName').value = category.name;
            document.getElementById('categorySlug').value = category.slug || '';
            document.getElementById('categoryDescription').value = category.description || '';
            document.getElementById('categoryOrder').value = category.displayOrder || 0;
            document.getElementById('categoryStatus').value = category.status || 'ACTIVE';
            
            if (category.imageUrl) {
                categoryImage = category.imageUrl;
                document.getElementById('categoryImagePreviewImg').src = categoryImage;
                document.getElementById('categoryImagePreview').classList.remove('hidden');
                document.getElementById('categoryImagePlaceholder').classList.add('hidden');
                document.getElementById('removeCategoryImageBtn').classList.remove('hidden');
            } else {
                removeCategoryImage();
            }
            
            clearErrors();
            document.getElementById('formModal').classList.remove('hidden');
        }

        function closeFormModal() {
            document.getElementById('formModal').classList.add('hidden');
        }

        function clearErrors() {
            document.querySelectorAll('.text-red-500.text-xs').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('input, select, textarea').forEach(el => el.classList.remove('border-red-500'));
        }

        function generateSlug(name) {
            if (!name) return "";
            let slug = name.toLowerCase().trim();
            slug = slug.replace(/[àáạảãâầấậẩẫăằắặẳẵ]/g, 'a');
            slug = slug.replace(/[èéẹẻẽêềếệểễ]/g, 'e');
            slug = slug.replace(/[ìíịỉĩ]/g, 'i');
            slug = slug.replace(/[òóọỏõôồốộổỗơờớợởỡ]/g, 'o');
            slug = slug.replace(/[ùúụủũưừứựửữ]/g, 'u');
            slug = slug.replace(/[ỳýỵỷỹ]/g, 'y');
            slug = slug.replace(/đ/g, 'd');
            slug = slug.replace(/[^a-z0-9\s-]/g, '');
            slug = slug.replace(/\s+/g, '-');
            slug = slug.replace(/-+/g, '-');
            slug = slug.replace(/^-|-$/g, '');
            return slug;
        }

        document.getElementById('categoryName').addEventListener('input', function() {
            document.getElementById('categorySlug').value = generateSlug(this.value);
        });

        document.getElementById('categoryForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearErrors();

            const name = document.getElementById('categoryName').value.trim();
            if (!name) {
                document.getElementById('nameError').classList.remove('hidden');
                document.getElementById('categoryName').classList.add('border-red-500');
                return;
            }

            const id = document.getElementById('categoryId').value;
            
            const data = {
                name: name,
                description: document.getElementById('categoryDescription').value,
                imageUrl: categoryImage,
                displayOrder: parseInt(document.getElementById('categoryOrder').value) || 0,
                status: document.getElementById('categoryStatus').value
            };

            try {
                const url = id ? `/api/admin/categories/${id}` : '/api/admin/categories';
                const method = id ? 'PUT' : 'POST';
                const response = await apiCall(url, method, data);
                
                if (response.success) {
                    showToast(id ? 'Cập nhật danh mục thành công' : 'Thêm danh mục thành công');
                    closeFormModal();
                    loadCategories();
                }
            } catch (error) {
                console.error('Error saving category:', error);
            }
        });

        async function deleteCategory(id) {
            const category = categories.find(c => c.id === id);
            showDeleteModal(`Bạn có chắc chắn muốn xóa danh mục "${category.name}"?`, async () => {
                try {
                    const response = await apiCall(`/api/admin/categories/${id}`, 'DELETE');
                    if (response.success) {
                        showToast('Xóa danh mục thành công');
                        loadCategories();
                    } else {
                        showToast(response.message || 'Không thể xóa danh mục', 'error');
                    }
                } catch (error) {
                    console.error('Error deleting category:', error);
                }
            });
        }

        // Event listeners for filters and sorting
        document.getElementById('searchInput').addEventListener('input', renderCategories);
        document.getElementById('filterStatus').addEventListener('change', renderCategories);
        
        document.querySelectorAll('#categoriesTableSortable th[data-sortable]').forEach(th => {
            th.addEventListener('click', () => handleSort(th.dataset.sort));
        });

        // Load data on page load
        document.addEventListener('DOMContentLoaded', loadCategories);
    </script>
    </th:block>
</th:block>
