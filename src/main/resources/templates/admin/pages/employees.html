<th:block th:fragment="page-content">
    <th:block th:with="title='Quản lý nhân viên', pageTitle='Quản lý nhân viên', activePage='employees'">
    
    <!-- Page Header -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6">
        <div>
            <h2 class="text-2xl font-display font-bold text-primary-800">Danh sách nhân viên</h2>
            <p class="text-primary-500 mt-1">Quản lý thông tin và phân quyền nhân viên</p>
        </div>
        <button onclick="openCreateModal()" class="mt-4 md:mt-0 px-6 py-2.5 btn-primary text-white rounded-lg font-medium flex items-center">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Thêm nhân viên
        </button>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="bg-white rounded-xl p-4 card-shadow border border-primary-100">
            <div class="flex items-center">
                <div class="w-10 h-10 bg-primary-100 rounded-lg flex items-center justify-center mr-3">
                    <svg class="w-5 h-5 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </div>
                <div>
                    <p class="text-sm text-primary-500">Tổng nhân viên</p>
                    <p class="text-xl font-bold text-primary-800" id="totalEmployees">0</p>
                </div>
            </div>
        </div>
        <div class="bg-white rounded-xl p-4 card-shadow border border-green-100">
            <div class="flex items-center">
                <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center mr-3">
                    <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <div>
                    <p class="text-sm text-primary-500">Đang làm việc</p>
                    <p class="text-xl font-bold text-green-600" id="activeEmployees">0</p>
                </div>
            </div>
        </div>
        <div class="bg-white rounded-xl p-4 card-shadow border border-yellow-100">
            <div class="flex items-center">
                <div class="w-10 h-10 bg-yellow-100 rounded-lg flex items-center justify-center mr-3">
                    <svg class="w-5 h-5 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <div>
                    <p class="text-sm text-primary-500">Nghỉ phép</p>
                    <p class="text-xl font-bold text-yellow-600" id="onLeaveEmployees">0</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-2xl p-4 mb-6 card-shadow border border-primary-100">
        <div class="flex flex-col md:flex-row md:items-center gap-4">
            <div class="flex-1 relative">
                <input type="text" id="searchInput" placeholder="Tìm kiếm nhân viên..." 
                    class="w-full pl-10 pr-4 py-2 border border-primary-200 rounded-lg text-sm focus:border-primary-500">
                <svg class="w-5 h-5 text-primary-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </div>
            <select id="filterStatus" class="px-4 py-2 border border-primary-200 rounded-lg text-sm focus:border-primary-500">
                <option value="">Tất cả trạng thái</option>
                <option value="ACTIVE">Đang làm việc</option>
                <option value="INACTIVE">Không hoạt động</option>
                <option value="ON_LEAVE">Nghỉ phép</option>
                <option value="RESIGNED">Đã nghỉ việc</option>
            </select>
            <select id="filterDepartment" class="px-4 py-2 border border-primary-200 rounded-lg text-sm focus:border-primary-500">
                <option value="">Tất cả phòng ban</option>
            </select>
        </div>
    </div>

    <!-- Employees Table -->
    <div class="bg-white rounded-2xl card-shadow border border-primary-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full" id="employeesTableSortable">
                <thead>
                    <tr class="table-header">
                        <th class="px-6 py-4 text-left text-xs font-semibold text-primary-700 uppercase tracking-wider" data-sortable data-sort="name">Nhân viên</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-primary-700 uppercase tracking-wider" data-sortable data-sort="contact">Liên hệ</th>
                        <th class="px-6 py-4 text-center text-xs font-semibold text-primary-700 uppercase tracking-wider" data-sortable data-sort="department">Phòng ban</th>
                        <th class="px-6 py-4 text-center text-xs font-semibold text-primary-700 uppercase tracking-wider" data-sortable data-sort="position">Chức vụ</th>
                        <th class="px-6 py-4 text-center text-xs font-semibold text-primary-700 uppercase tracking-wider" data-sortable data-sort="status">Trạng thái</th>
                        <th class="px-6 py-4 text-center text-xs font-semibold text-primary-700 uppercase tracking-wider">Hành động</th>
                    </tr>
                </thead>
                <tbody id="employeesTable">
                    <tr>
                        <td colspan="6" class="px-6 py-12 text-center text-primary-500">Đang tải dữ liệu...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="formModal" class="fixed inset-0 z-50 hidden overflow-y-auto">
        <div class="modal-backdrop absolute inset-0 bg-black/50" onclick="closeFormModal()"></div>
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="modal-content relative bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto my-auto">
                <div class="sticky top-0 bg-white border-b border-primary-100 px-6 py-4 flex items-center justify-between z-10 rounded-t-2xl">
                    <h3 class="text-xl font-display font-semibold text-primary-800" id="modalTitle">Thêm nhân viên mới</h3>
                    <button onclick="closeFormModal()" class="p-2 text-primary-400 hover:text-primary-600 rounded-lg hover:bg-primary-50">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <form id="employeeForm" class="p-6">
                    <input type="hidden" id="employeeId">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-primary-700 mb-2">Họ tên <span class="text-red-500">*</span></label>
                            <input type="text" id="employeeFullName" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500" placeholder="Nhập họ tên đầy đủ" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Email <span class="text-red-500">*</span></label>
                            <input type="email" id="employeeEmail" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500" placeholder="email@ntfurniture.com" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Số điện thoại</label>
                            <input type="tel" id="employeePhone" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500" placeholder="0123 456 789">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-primary-700 mb-2">Địa chỉ</label>
                            <input type="text" id="employeeAddress" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500" placeholder="Địa chỉ đầy đủ">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Phòng ban</label>
                            <select id="employeeDepartment" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500">
                                <option value="">Chọn phòng ban</option>
                                <option value="Kinh doanh">Kinh doanh</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Nhân sự">Nhân sự</option>
                                <option value="Tài chính">Tài chính</option>
                                <option value="Kỹ thuật">Kỹ thuật</option>
                                <option value="Kho">Kho</option>
                                <option value="Giao hàng">Giao hàng</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Chức vụ</label>
                            <input type="text" id="employeePosition" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500" placeholder="VD: Nhân viên, Quản lý">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Ngày vào làm</label>
                            <input type="date" id="employeeHireDate" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Ngày sinh</label>
                            <input type="date" id="employeeDateOfBirth" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Giới tính</label>
                            <select id="employeeGender" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500">
                                <option value="">Chọn giới tính</option>
                                <option value="MALE">Nam</option>
                                <option value="FEMALE">Nữ</option>
                                <option value="OTHER">Khác</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Lương (VNĐ)</label>
                            <input type="number" id="employeeSalary" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500" placeholder="0" min="0">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Trạng thái</label>
                            <select id="employeeStatus" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500">
                                <option value="ACTIVE">Đang làm việc</option>
                                <option value="INACTIVE">Không hoạt động</option>
                                <option value="ON_LEAVE">Nghỉ phép</option>
                                <option value="RESIGNED">Đã nghỉ việc</option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end space-x-3">
                        <button type="button" onclick="closeFormModal()" class="px-6 py-2 border border-primary-300 text-primary-700 rounded-lg hover:bg-primary-50 font-medium transition-colors">Hủy bỏ</button>
                        <button type="submit" class="px-6 py-2 btn-primary text-white rounded-lg font-medium">Lưu</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let employees = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        async function loadEmployees() {
            try {
                const response = await apiCall('/api/admin/employees');
                if (response.success) {
                    employees = response.data;
                    updateStats();
                    renderEmployees();
                }
            } catch (error) {
                console.error('Error loading employees:', error);
            }
        }

        function updateStats() {
            document.getElementById('totalEmployees').textContent = employees.length;
            document.getElementById('activeEmployees').textContent = employees.filter(e => e.status === 'ACTIVE').length;
            document.getElementById('onLeaveEmployees').textContent = employees.filter(e => e.status === 'ON_LEAVE').length;
        }

        function renderEmployees() {
            const tbody = document.getElementById('employeesTable');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('filterStatus').value;
            const departmentFilter = document.getElementById('filterDepartment').value;

            let filtered = employees.filter(e => {
                const matchSearch = !search || 
                    e.fullName.toLowerCase().includes(search) || 
                    e.email.toLowerCase().includes(search) ||
                    (e.phone && e.phone.includes(search));
                const matchStatus = !statusFilter || e.status === statusFilter;
                const matchDepartment = !departmentFilter || e.department === departmentFilter;
                return matchSearch && matchStatus && matchDepartment;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-12 text-center text-primary-500">Không tìm thấy nhân viên</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(employee => `
                <tr class="table-row border-b border-primary-100">
                    <td class="px-6 py-4">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-primary-400 to-secondary-400 flex items-center justify-center text-white font-semibold mr-3">
                                ${employee.fullName.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <p class="text-sm font-medium text-primary-800">${employee.fullName}</p>
                                <p class="text-xs text-primary-500">${employee.email}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm text-primary-700">${employee.phone || '-'}</div>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="text-sm text-primary-700">${employee.department || '-'}</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="text-sm text-primary-700">${employee.position || '-'}</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        ${getEmployeeStatusBadge(employee.status)}
                        ${employee.isAdmin ? '<span class="ml-1 px-2 py-0.5 text-xs bg-blue-100 text-blue-700 rounded-full">Admin</span>' : ''}
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex items-center justify-center space-x-2">
                            <button onclick="editEmployee(${employee.id})" class="p-2 text-primary-600 hover:bg-primary-50 rounded-lg" title="Chỉnh sửa">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                </svg>
                            </button>
                            <button onclick="deleteEmployee(${employee.id})" class="p-2 text-red-600 hover:bg-red-50 rounded-lg" title="Xóa">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function getEmployeeStatusBadge(status) {
            const statusMap = {
                'ACTIVE': '<span class="status-badge bg-green-100 text-green-700">Đang làm</span>',
                'INACTIVE': '<span class="status-badge bg-gray-100 text-gray-600">Không hoạt động</span>',
                'ON_LEAVE': '<span class="status-badge bg-yellow-100 text-yellow-700">Nghỉ phép</span>',
                'RESIGNED': '<span class="status-badge bg-red-100 text-red-700">Đã nghỉ</span>'
            };
            return statusMap[status] || `<span class="status-badge bg-gray-100 text-gray-600">${status}</span>`;
        }

        function openCreateModal() {
            document.getElementById('modalTitle').textContent = 'Thêm nhân viên mới';
            document.getElementById('employeeForm').reset();
            document.getElementById('employeeId').value = '';
            document.getElementById('formModal').classList.remove('hidden');
        }

        function editEmployee(id) {
            const employee = employees.find(e => e.id === id);
            if (!employee) return;

            document.getElementById('modalTitle').textContent = 'Chỉnh sửa nhân viên';
            document.getElementById('employeeId').value = employee.id;
            document.getElementById('employeeFullName').value = employee.fullName || '';
            document.getElementById('employeeEmail').value = employee.email || '';
            document.getElementById('employeePhone').value = employee.phone || '';
            document.getElementById('employeeAddress').value = employee.address || '';
            document.getElementById('employeeDepartment').value = employee.department || '';
            document.getElementById('employeePosition').value = employee.position || '';
            document.getElementById('employeeHireDate').value = employee.hireDate || '';
            document.getElementById('employeeDateOfBirth').value = employee.dateOfBirth || '';
            document.getElementById('employeeGender').value = employee.gender || '';
            document.getElementById('employeeSalary').value = employee.salary || '';
            document.getElementById('employeeStatus').value = employee.status || 'ACTIVE';

            document.getElementById('formModal').classList.remove('hidden');
        }

        function closeFormModal() {
            document.getElementById('formModal').classList.add('hidden');
        }

        document.getElementById('employeeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('employeeId').value;
            
            const data = {
                fullName: document.getElementById('employeeFullName').value,
                email: document.getElementById('employeeEmail').value,
                phone: document.getElementById('employeePhone').value,
                address: document.getElementById('employeeAddress').value,
                department: document.getElementById('employeeDepartment').value,
                position: document.getElementById('employeePosition').value,
                hireDate: document.getElementById('employeeHireDate').value,
                dateOfBirth: document.getElementById('employeeDateOfBirth').value,
                gender: document.getElementById('employeeGender').value,
                salary: parseFloat(document.getElementById('employeeSalary').value) || null,
                status: document.getElementById('employeeStatus').value,
            };

            try {
                const url = id ? `/api/admin/employees/${id}` : '/api/admin/employees';
                const method = id ? 'PUT' : 'POST';
                const response = await apiCall(url, method, data);
                
                if (response.success) {
                    showToast(id ? 'Cập nhật nhân viên thành công' : 'Thêm nhân viên thành công');
                    closeFormModal();
                    loadEmployees();
                }
            } catch (error) {
                console.error('Error saving employee:', error);
            }
        });

        async function deleteEmployee(id) {
            const employee = employees.find(e => e.id === id);
            showDeleteModal(`Bạn có chắc chắn muốn xóa nhân viên "${employee.fullName}"?`, async () => {
                try {
                    const response = await apiCall(`/api/admin/employees/${id}`, 'DELETE');
                    if (response.success) {
                        showToast('Xóa nhân viên thành công');
                        loadEmployees();
                    }
                } catch (error) {
                    console.error('Error deleting employee:', error);
                }
            });
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', renderEmployees);
        document.getElementById('filterStatus').addEventListener('change', renderEmployees);
        document.getElementById('filterDepartment').addEventListener('change', renderEmployees);

        // Load data
        document.addEventListener('DOMContentLoaded', function() {
            loadEmployees();
            initTableSort('employeesTableSortable');
        });
    </script>
    </th:block>
</th:block>
