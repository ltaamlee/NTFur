<th:block th:fragment="page-content">
    <!-- Page Header -->
    <th:block th:with="title='Quản lý khách hàng', pageTitle='Quản lý khách hàng', activePage='customers'">
    
    <!-- Page Header -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6">
        <div>
            <h2 class="text-2xl font-display font-bold text-primary-800">Danh sách khách hàng</h2>
            <p class="text-primary-500 mt-1">Quản lý thông tin khách hàng</p>
        </div>
        <div class="mt-4 md:mt-0 flex items-center space-x-3">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Tìm kiếm khách hàng..." 
                    class="w-full md:w-64 pl-10 pr-4 py-2 border border-primary-200 rounded-lg text-sm focus:border-primary-500">
                <svg class="w-5 h-5 text-primary-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="bg-white rounded-xl p-4 card-shadow border border-primary-100">
            <div class="flex items-center">
                <div class="w-10 h-10 bg-primary-100 rounded-lg flex items-center justify-center mr-3">
                    <svg class="w-5 h-5 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                    </svg>
                </div>
                <div>
                    <p class="text-sm text-primary-500">Tổng khách hàng</p>
                    <p class="text-xl font-bold text-primary-800" id="totalCustomers">0</p>
                </div>
            </div>
        </div>
        <div class="bg-white rounded-xl p-4 card-shadow border border-primary-100">
            <div class="flex items-center">
                <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center mr-3">
                    <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <div>
                    <p class="text-sm text-primary-500">Tổng chi tiêu</p>
                    <p class="text-xl font-bold text-green-600" id="totalSpent">0đ</p>
                </div>
            </div>
        </div>
        <div class="bg-white rounded-xl p-4 card-shadow border border-primary-100">
            <div class="flex items-center">
                <div class="w-10 h-10 bg-secondary-100 rounded-lg flex items-center justify-center mr-3">
                    <svg class="w-5 h-5 text-secondary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                </div>
                <div>
                    <p class="text-sm text-primary-500">Đơn hàng trung bình</p>
                    <p class="text-xl font-bold text-secondary-600" id="avgOrders">0</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Customers Table -->
    <div class="bg-white rounded-2xl card-shadow border border-primary-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead>
                    <tr class="table-header">
                        <th class="px-6 py-4 text-left text-xs font-semibold text-primary-700 uppercase tracking-wider">Khách hàng</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-primary-700 uppercase tracking-wider">Liên hệ</th>
                        <th class="px-6 py-4 text-center text-xs font-semibold text-primary-700 uppercase tracking-wider">Số đơn hàng</th>
                        <th class="px-6 py-4 text-right text-xs font-semibold text-primary-700 uppercase tracking-wider">Tổng chi tiêu</th>
                        <th class="px-6 py-4 text-center text-xs font-semibold text-primary-700 uppercase tracking-wider">Ngày tham gia</th>
                        <th class="px-6 py-4 text-center text-xs font-semibold text-primary-700 uppercase tracking-wider">Hành động</th>
                    </tr>
                </thead>
                <tbody id="customersTable">
                    <tr>
                        <td colspan="6" class="px-6 py-12 text-center text-primary-500">Đang tải dữ liệu...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <div class="mt-6 flex justify-center" id="pagination"></div>

    <!-- View/Edit Modal -->
    <div id="viewModal" class="fixed inset-0 z-50 hidden">
        <div class="modal-backdrop absolute inset-0 bg-black/50" onclick="closeViewModal()"></div>
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="modal-content relative bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto my-auto">
                <div class="sticky top-0 bg-white border-b border-primary-100 px-6 py-4 flex items-center justify-between rounded-t-2xl">
                    <h3 class="text-xl font-display font-semibold text-primary-800">Chi tiết khách hàng</h3>
                    <button onclick="closeViewModal()" class="p-2 text-primary-400 hover:text-primary-600 rounded-lg hover:bg-primary-50">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="p-6" id="viewModalContent"></div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 z-50 hidden">
        <div class="modal-backdrop absolute inset-0 bg-black/50" onclick="closeEditModal()"></div>
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="modal-content relative bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto my-auto">
                <div class="sticky top-0 bg-white border-b border-primary-100 px-6 py-4 flex items-center justify-between rounded-t-2xl">
                    <h3 class="text-xl font-display font-semibold text-primary-800">Chỉnh sửa khách hàng</h3>
                    <button onclick="closeEditModal()" class="p-2 text-primary-400 hover:text-primary-600 rounded-lg hover:bg-primary-50">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <form id="editForm" class="p-6">
                    <input type="hidden" id="editId">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-primary-700 mb-2">Họ tên</label>
                            <input type="text" id="editFullName" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Email</label>
                            <input type="email" id="editEmail" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Số điện thoại</label>
                            <input type="tel" id="editPhone" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-primary-700 mb-2">Địa chỉ</label>
                            <textarea id="editAddress" rows="2" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Thành phố</label>
                            <input type="text" id="editCity" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Quận/Huyện</label>
                            <input type="text" id="editDistrict" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Giới tính</label>
                            <select id="editGender" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500">
                                <option value="">Chọn giới tính</option>
                                <option value="MALE">Nam</option>
                                <option value="FEMALE">Nữ</option>
                                <option value="OTHER">Khác</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-primary-700 mb-2">Ghi chú</label>
                            <textarea id="editNotes" rows="2" class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500"></textarea>
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end space-x-3">
                        <button type="button" onclick="closeEditModal()" class="px-6 py-2 border border-primary-300 text-primary-700 rounded-lg hover:bg-primary-50 font-medium transition-colors">Hủy bỏ</button>
                        <button type="submit" class="px-6 py-2 btn-primary text-white rounded-lg font-medium">Lưu thay đổi</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let customers = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        async function loadCustomers() {
            try {
                const response = await apiCall('/api/admin/customers');
                if (response.success) {
                    customers = response.data;
                    updateStats();
                    renderCustomers();
                }
            } catch (error) {
                console.error('Error loading customers:', error);
            }
        }

        function updateStats() {
            document.getElementById('totalCustomers').textContent = customers.length;
            const totalSpent = customers.reduce((sum, c) => sum + (c.totalSpent || 0), 0);
            document.getElementById('totalSpent').textContent = formatCurrency(totalSpent);
            const totalOrders = customers.reduce((sum, c) => sum + (c.totalOrders || 0), 0);
            document.getElementById('avgOrders').textContent = customers.length > 0 ? Math.round(totalOrders / customers.length) : 0;
        }

        function renderCustomers() {
            const tbody = document.getElementById('customersTable');
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const paginatedCustomers = customers.slice(start, end);

            if (paginatedCustomers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-12 text-center text-primary-500">Chưa có khách hàng nào</td></tr>';
                return;
            }

            tbody.innerHTML = paginatedCustomers.map(customer => `
                <tr class="table-row border-b border-primary-100">
                    <td class="px-6 py-4">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-primary-400 to-secondary-400 flex items-center justify-center text-white font-semibold mr-3">
                                ${customer.fullName ? customer.fullName.charAt(0).toUpperCase() : 'U'}
                            </div>
                            <div>
                                <p class="text-sm font-medium text-primary-800">${customer.fullName || 'Chưa cập nhật'}</p>
                                <p class="text-xs text-primary-500">ID: ${customer.id}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm text-primary-700">${customer.email || '-'}</div>
                        <div class="text-xs text-primary-500">${customer.phone || '-'}</div>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="text-sm font-semibold text-primary-700">${customer.totalOrders || 0}</span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <span class="text-sm font-semibold text-green-600">${formatCurrency(customer.totalSpent || 0)}</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="text-sm text-primary-600">${formatDate(customer.createdAt)}</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex items-center justify-center space-x-2">
                            <button onclick="viewCustomer(${customer.id})" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg" title="Xem chi tiết">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </button>
                            <button onclick="editCustomer(${customer.id})" class="p-2 text-primary-600 hover:bg-primary-50 rounded-lg" title="Chỉnh sửa">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                </svg>
                            </button>
                            <button onclick="deleteCustomer(${customer.id})" class="p-2 text-red-600 hover:bg-red-50 rounded-lg" title="Xóa">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');

            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(customers.length / itemsPerPage);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '<div class="flex items-center space-x-2">';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button onclick="goToPage(${i})" class="px-4 py-2 rounded-lg ${i === currentPage ? 'btn-primary text-white' : 'border border-primary-200 text-primary-700 hover:bg-primary-50'}">${i}</button>`;
            }
            html += '</div>';
            pagination.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            renderCustomers();
        }

        async function viewCustomer(id) {
            const customer = customers.find(c => c.id === id);
            if (!customer) return;

            const content = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <div class="flex items-center mb-6">
                            <div class="w-16 h-16 rounded-full bg-gradient-to-br from-primary-400 to-secondary-400 flex items-center justify-center text-white text-2xl font-bold mr-4">
                                ${customer.fullName ? customer.fullName.charAt(0).toUpperCase() : 'U'}
                            </div>
                            <div>
                                <h4 class="text-xl font-semibold text-primary-800">${customer.fullName || 'Chưa cập nhật'}</h4>
                                <p class="text-primary-500">ID: ${customer.id}</p>
                            </div>
                        </div>
                        <div>
                            <label class="text-xs font-semibold text-primary-400 uppercase">Email</label>
                            <p class="text-primary-800">${customer.email || 'Chưa cập nhật'}</p>
                        </div>
                        <div>
                            <label class="text-xs font-semibold text-primary-400 uppercase">Số điện thoại</label>
                            <p class="text-primary-800">${customer.phone || 'Chưa cập nhật'}</p>
                        </div>
                        <div>
                            <label class="text-xs font-semibold text-primary-400 uppercase">Giới tính</label>
                            <p class="text-primary-800">${getGenderLabel(customer.gender)}</p>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-semibold text-primary-400 uppercase">Địa chỉ</label>
                            <p class="text-primary-800">${customer.formattedAddress || customer.address || 'Chưa cập nhật'}</p>
                        </div>
                        <div>
                            <label class="text-xs font-semibold text-primary-400 uppercase">Số đơn hàng</label>
                            <p class="text-2xl font-bold text-primary-800">${customer.totalOrders || 0}</p>
                        </div>
                        <div>
                            <label class="text-xs font-semibold text-primary-400 uppercase">Tổng chi tiêu</label>
                            <p class="text-2xl font-bold text-green-600">${formatCurrency(customer.totalSpent || 0)}</p>
                        </div>
                        <div>
                            <label class="text-xs font-semibold text-primary-400 uppercase">Ngày tham gia</label>
                            <p class="text-primary-800">${formatDate(customer.createdAt)}</p>
                        </div>
                    </div>
                </div>
                ${customer.notes ? `<div class="mt-6"><label class="text-xs font-semibold text-primary-400 uppercase">Ghi chú</label><p class="text-primary-700 mt-1">${customer.notes}</p></div>` : ''}
            `;

            document.getElementById('viewModalContent').innerHTML = content;
            document.getElementById('viewModal').classList.remove('hidden');
        }

        function closeViewModal() {
            document.getElementById('viewModal').classList.add('hidden');
        }

        async function editCustomer(id) {
            const customer = customers.find(c => c.id === id);
            if (!customer) return;

            document.getElementById('editId').value = customer.id;
            document.getElementById('editFullName').value = customer.fullName || '';
            document.getElementById('editEmail').value = customer.email || '';
            document.getElementById('editPhone').value = customer.phone || '';
            document.getElementById('editAddress').value = customer.address || '';
            document.getElementById('editCity').value = customer.city || '';
            document.getElementById('editDistrict').value = customer.district || '';
            document.getElementById('editGender').value = customer.gender || '';
            document.getElementById('editNotes').value = customer.notes || '';

            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            
            const data = {
                fullName: document.getElementById('editFullName').value,
                email: document.getElementById('editEmail').value,
                phone: document.getElementById('editPhone').value,
                address: document.getElementById('editAddress').value,
                city: document.getElementById('editCity').value,
                district: document.getElementById('editDistrict').value,
                gender: document.getElementById('editGender').value,
                notes: document.getElementById('editNotes').value
            };

            try {
                const response = await apiCall(`/api/admin/customers/${id}`, 'PUT', data);
                if (response.success) {
                    showToast('Cập nhật khách hàng thành công');
                    closeEditModal();
                    loadCustomers();
                }
            } catch (error) {
                console.error('Error updating customer:', error);
            }
        });

        async function deleteCustomer(id) {
            showDeleteModal('Bạn có chắc chắn muốn xóa khách hàng này?', async () => {
                try {
                    const response = await apiCall(`/api/admin/customers/${id}`, 'DELETE');
                    if (response.success) {
                        showToast('Xóa khách hàng thành công');
                        loadCustomers();
                    }
                } catch (error) {
                    console.error('Error deleting customer:', error);
                }
            });
        }

        function getGenderLabel(gender) {
            const map = { 'MALE': 'Nam', 'FEMALE': 'Nữ', 'OTHER': 'Khác' };
            return map[gender] || 'Chưa cập nhật';
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            const filtered = customers.filter(c => 
                (c.fullName && c.fullName.toLowerCase().includes(keyword)) ||
                (c.email && c.email.toLowerCase().includes(keyword)) ||
                (c.phone && c.phone.includes(keyword))
            );
            currentPage = 1;
            renderFilteredCustomers(filtered);
        });

        function renderFilteredCustomers(filtered) {
            const tbody = document.getElementById('customersTable');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-12 text-center text-primary-500">Không tìm thấy khách hàng</td></tr>';
                return;
            }
            customers = filtered;
            renderCustomers();
        }

        // Load data on page load
        document.addEventListener('DOMContentLoaded', loadCustomers);
    </script>
    </th:block>
</th:block>
