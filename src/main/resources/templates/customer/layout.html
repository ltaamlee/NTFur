<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - NTFurniture'">Tài khoản - NTFurniture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50:'#fdf8f6',100:'#f2e8e5',200:'#eaddd7',300:'#e0cec7',400:'#d2bab0',
                            500:'#bfa094',600:'#a18072',700:'#977669',800:'#846358',900:'#43302b',
                        },
                        secondary: { 600:'#c4a47d',700:'#a67c52',800:'#866744' }
                    },
                    fontFamily: { display: ['Playfair Display','serif'], body: ['Poppins','sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .sidebar-customer-link.active {
            background: linear-gradient(135deg, #a67c52 0%, #977669 100%);
            color: white;
        }
        .sidebar-customer-link:hover:not(.active) { background: rgba(166, 124, 82, 0.1); }
        .card-shadow { box-shadow: 0 4px 20px rgba(67, 48, 43, 0.08); }
    </style>
</head>
<body class="bg-primary-50 min-h-screen">
    <div class="flex min-h-screen">
        <aside class="hidden md:flex w-64 flex-col border-r border-primary-200 bg-white">
            <div class="h-16 flex items-center px-4 border-b border-primary-200 bg-gradient-to-r from-primary-800 to-primary-900">
                <a href="/" class="text-white font-display font-bold text-lg">NTFurniture</a>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                <p class="px-3 text-xs font-semibold text-primary-400 uppercase tracking-wider mb-2">Tài khoản</p>
                <a href="/profile" class="sidebar-customer-link flex items-center px-4 py-3 rounded-xl text-primary-800 transition-all"
                   th:classappend="${activePage == 'profile' ? 'active' : ''}">
                    <svg class="w-5 h-5 mr-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    Hồ sơ của tôi
                </a>
                <a href="/cart" class="sidebar-customer-link flex items-center px-4 py-3 rounded-xl text-primary-800 transition-all"
                   th:classappend="${activePage == 'cart' ? 'active' : ''}">
                    <svg class="w-5 h-5 mr-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17"/></svg>
                    Giỏ hàng
                </a>
                <a href="/checkout" class="sidebar-customer-link flex items-center px-4 py-3 rounded-xl text-primary-800 transition-all"
                   th:classappend="${activePage == 'checkout' ? 'active' : ''}">
                    <svg class="w-5 h-5 mr-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2z"/></svg>
                    Thanh toán
                </a>
                <div class="pt-4 border-t border-primary-100 mt-4">
                    <a href="/products" class="flex items-center px-4 py-3 rounded-xl text-secondary-700 hover:bg-primary-50 transition-all">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                        Tiếp tục mua sắm
                    </a>
                </div>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col min-w-0">
            <header class="h-14 md:h-16 bg-white border-b border-primary-200 flex items-center justify-between px-4 md:px-8">
                <div class="flex items-center gap-3">
                    <button type="button" class="md:hidden p-2 rounded-lg hover:bg-primary-50 text-primary-800" id="openMobileNav" aria-label="Menu">☰</button>
                    <h1 class="text-lg md:text-xl font-display font-semibold text-primary-900" th:text="${pageTitle}">Trang</h1>
                </div>
                <a href="/" class="text-sm text-secondary-700 hover:text-secondary-900 font-medium">Về trang chủ</a>
            </header>
            <main class="flex-1 p-4 md:p-8">
                <div th:insert="~{__${content}__ :: page-content}"></div>
            </main>
        </div>
    </div>

    <!-- Mobile drawer -->
    <div id="mobileNav" class="fixed inset-0 z-50 hidden md:hidden">
        <div class="absolute inset-0 bg-black/40" id="mobileNavBackdrop"></div>
        <div class="absolute left-0 top-0 bottom-0 w-72 bg-white shadow-xl p-4">
            <p class="font-semibold text-primary-900 mb-3">Menu</p>
            <nav class="space-y-1">
                <a href="/profile" class="block px-4 py-3 rounded-xl hover:bg-primary-50">Hồ sơ</a>
                <a href="/cart" class="block px-4 py-3 rounded-xl hover:bg-primary-50">Giỏ hàng</a>
                <a href="/checkout" class="block px-4 py-3 rounded-xl hover:bg-primary-50">Thanh toán</a>
                <a href="/products" class="block px-4 py-3 rounded-xl hover:bg-primary-50">Cửa hàng</a>
            </nav>
        </div>
    </div>
    <script>
        (function () {
            var open = document.getElementById('openMobileNav');
            var panel = document.getElementById('mobileNav');
            var back = document.getElementById('mobileNavBackdrop');
            if (open && panel) {
                open.addEventListener('click', function () { panel.classList.remove('hidden'); });
                if (back) back.addEventListener('click', function () { panel.classList.add('hidden'); });
            }
        })();
    </script>
</body>
</html>
