<th:block th:fragment="page-content">
    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        <section class="lg:col-span-2 bg-white rounded-2xl card-shadow border border-primary-100 p-6 md:p-8">
            <h2 class="text-xl font-display font-bold text-primary-900 mb-2">Giao hàng &amp; thanh toán</h2>
            <p class="text-sm text-primary-600 mb-6">Phí ship và tổng tiền cập nhật qua API xem trước đơn.</p>
            <form id="checkoutForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-1">
                    <label class="text-xs font-medium text-primary-700">Họ tên <span class="text-red-500">*</span></label>
                    <input id="fullName" type="text" required class="mt-1 w-full border border-primary-200 rounded-xl px-4 py-2.5 text-sm">
                </div>
                <div>
                    <label class="text-xs font-medium text-primary-700">Số điện thoại <span class="text-red-500">*</span></label>
                    <input id="phone" type="tel" required class="mt-1 w-full border border-primary-200 rounded-xl px-4 py-2.5 text-sm">
                </div>
                <div>
                    <label class="text-xs font-medium text-primary-700">Tỉnh / Thành <span class="text-red-500">*</span></label>
                    <input id="city" type="text" required placeholder="VD: TP. Hồ Chí Minh" class="mt-1 w-full border border-primary-200 rounded-xl px-4 py-2.5 text-sm">
                </div>
                <div>
                    <label class="text-xs font-medium text-primary-700">Quận / Huyện</label>
                    <input id="district" type="text" class="mt-1 w-full border border-primary-200 rounded-xl px-4 py-2.5 text-sm">
                </div>
                <div>
                    <label class="text-xs font-medium text-primary-700">Phường / Xã</label>
                    <input id="ward" type="text" class="mt-1 w-full border border-primary-200 rounded-xl px-4 py-2.5 text-sm">
                </div>
                <div class="md:col-span-2">
                    <label class="text-xs font-medium text-primary-700">Địa chỉ cụ thể <span class="text-red-500">*</span></label>
                    <input id="address" type="text" required class="mt-1 w-full border border-primary-200 rounded-xl px-4 py-2.5 text-sm">
                </div>
                <div class="md:col-span-2">
                    <label class="text-xs font-medium text-primary-700">Ghi chú</label>
                    <textarea id="notes" rows="2" class="mt-1 w-full border border-primary-200 rounded-xl px-4 py-2.5 text-sm"></textarea>
                </div>
                <div class="md:col-span-2 flex flex-wrap gap-6 py-2">
                    <label class="inline-flex items-center gap-2 cursor-pointer"><input type="radio" name="paymentMethod" value="COD" checked class="accent-secondary-700"> <span class="text-sm">COD</span></label>
                    <label class="inline-flex items-center gap-2 cursor-pointer"><input type="radio" name="paymentMethod" value="ONLINE" class="accent-secondary-700"> <span class="text-sm">Chuyển khoản (VietQR)</span></label>
                </div>
                <div class="md:col-span-2">
                    <button type="submit" class="w-full sm:w-auto px-8 py-3 rounded-xl bg-gradient-to-r from-secondary-700 to-primary-800 text-white font-semibold text-sm hover:opacity-95 active:scale-[0.98] transition shadow-md">Đặt hàng</button>
                </div>
            </form>
            <div id="qrBox" class="hidden mt-6 border border-primary-200 rounded-2xl p-6 bg-primary-50/50">
                <h3 class="font-semibold text-primary-900 mb-3">Quét VietQR</h3>
                <img id="qrImg" class="max-w-xs rounded-xl border border-white shadow" alt="vietqr">
                <p id="orderCode" class="text-sm text-primary-600 mt-3"></p>
            </div>
        </section>
        <section class="bg-white rounded-2xl card-shadow border border-primary-100 p-6 h-fit sticky top-24">
            <h3 class="font-display font-semibold text-primary-900">Tóm tắt</h3>
            <div id="items" class="mt-4 space-y-2 text-sm max-h-64 overflow-y-auto"></div>
            <div class="mt-4 border-t border-primary-100 pt-4 text-sm space-y-2 text-primary-800">
                <div class="flex justify-between"><span>Tạm tính</span><span id="subtotal">0đ</span></div>
                <div class="flex justify-between"><span>Phí giao hàng</span><span id="shippingFee">0đ</span></div>
                <div class="flex justify-between font-bold text-base pt-2"><span>Tổng</span><span id="total" class="text-secondary-800">0đ</span></div>
            </div>
        </section>
    </div>
    <script>
        (function () {
            function token() { return localStorage.getItem('accessToken'); }
            if (!token()) { window.location.href = '/login'; return; }

            function cart() { try { return JSON.parse(localStorage.getItem('cart') || '[]'); } catch (e) { return []; } }
            function formatVnd(v) { return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(Number(v) || 0); }

            async function api(url, method, body) {
                var res = await fetch(url, {
                    method: method || 'GET',
                    headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (token() || '')},
                    body: body ? JSON.stringify(body) : undefined
                });
                return res.json();
            }

            async function loadProfilePrefill() {
                var p = await api('/api/customer/profile');
                if (!p.success || !p.data) return;
                var d = p.data;
                if (d.fullName) document.getElementById('fullName').value = d.fullName;
                if (d.phone) document.getElementById('phone').value = d.phone;
                if (d.city) document.getElementById('city').value = d.city;
                if (d.district) document.getElementById('district').value = d.district;
                if (d.ward) document.getElementById('ward').value = d.ward;
                if (d.address) document.getElementById('address').value = d.address;
            }

            async function loadProductsMap() {
                var res = await fetch('/api/products');
                var data = await res.json();
                var list = data.success && data.data ? data.data : [];
                var m = {};
                list.forEach(function (p) { m[p.id] = p; });
                return m;
            }

            async function renderItems() {
                var byId = await loadProductsMap();
                var items = cart();
                var el = document.getElementById('items');
                if (!items.length) {
                    el.innerHTML = '<p class="text-primary-500">Giỏ hàng trống. <a href="/products" class="text-secondary-700 underline">Mua sắm</a></p>';
                    return;
                }
                el.innerHTML = items.map(function (i) {
                    var p = byId[i.id];
                    var name = p ? p.name : (i.name || 'SP');
                    var price = p ? Number(p.price) : Number(i.price);
                    return '<div class="flex justify-between gap-2"><span class="truncate">' + name + ' ×' + i.quantity + '</span><span>' + formatVnd(price * i.quantity) + '</span></div>';
                }).join('');
            }

            async function preview() {
                var items = cart().map(function (i) { return { productId: i.id, quantity: i.quantity }; });
                if (!items.length) return;
                var body = {
                    fullName: document.getElementById('fullName').value || 'x',
                    phone: document.getElementById('phone').value || '0123456789',
                    city: document.getElementById('city').value || 'TP. Hồ Chí Minh',
                    district: document.getElementById('district').value || '',
                    ward: document.getElementById('ward').value || '',
                    address: document.getElementById('address').value || 'x',
                    items: items
                };
                var r = await api('/api/customer/orders/preview', 'POST', body);
                if (!r.success) return;
                document.getElementById('subtotal').textContent = formatVnd(r.data.subtotal);
                document.getElementById('shippingFee').textContent = formatVnd(r.data.shippingFee);
                document.getElementById('total').textContent = formatVnd(r.data.totalAmount);
            }

            document.getElementById('checkoutForm').addEventListener('submit', async function (e) {
                e.preventDefault();
                var selected = (document.querySelector('input[name="paymentMethod"]:checked') || {}).value || 'COD';
                var body = {
                    fullName: document.getElementById('fullName').value,
                    phone: document.getElementById('phone').value,
                    city: document.getElementById('city').value,
                    district: document.getElementById('district').value,
                    ward: document.getElementById('ward').value,
                    address: document.getElementById('address').value,
                    notes: document.getElementById('notes').value,
                    paymentMethod: selected,
                    items: cart().map(function (i) { return { productId: i.id, quantity: i.quantity }; })
                };
                var r = await api('/api/customer/orders', 'POST', body);
                if (!r.success) { alert(r.message || 'Đặt hàng thất bại'); return; }
                alert('Đặt hàng thành công! Mã đơn: ' + r.data.orderNumber);
                if (selected === 'ONLINE' && r.data.vietQrUrl) {
                    document.getElementById('qrBox').classList.remove('hidden');
                    document.getElementById('qrImg').src = r.data.vietQrUrl;
                    document.getElementById('orderCode').textContent = 'Mã đơn: ' + r.data.orderNumber;
                } else {
                    localStorage.removeItem('cart');
                    window.location.href = '/profile';
                }
            });

            ['fullName','phone','city','district','ward','address'].forEach(function (id) {
                var el = document.getElementById(id);
                if (el) el.addEventListener('change', preview);
            });

            loadProfilePrefill();
            renderItems().then(preview);
        })();
    </script>
</th:block>
