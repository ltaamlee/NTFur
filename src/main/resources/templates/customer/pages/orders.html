<th:block th:fragment="page-content">
    <div class="max-w-6xl mx-auto">

        <!-- Orders Header -->
        <div class="mb-6">
            <h2 class="text-2xl font-display font-bold text-primary-900">Đơn hàng của tôi</h2>
            <p class="text-sm text-primary-600 mt-1">Xem và quản lý tất cả đơn hàng của bạn</p>
        </div>

        <!-- Order Status Filter Bar - Modern Pills Style -->
        <div class="overflow-x-auto pb-2 mb-6" id="orderStatusBar">
            <div class="flex gap-2 min-w-max">
            <button id="filterAllBtn" class="order-status-btn active shrink-0" data-status="">
                <span class="w-2 h-2 rounded-full bg-primary-400"></span>
                Tất cả
                <span id="countAll" class="ml-1.5 px-1.5 py-0.5 rounded-full text-xs font-medium bg-white/80 text-primary-700 border border-primary-200/50">0</span>
            </button>
            <button id="filterUNPAIDBtn" class="order-status-btn shrink-0" data-status="PENDING">
                <span class="w-2 h-2 rounded-full bg-amber-400"></span>
                Chưa thanh toán
                <span id="countUNPAID" class="ml-1.5 px-1.5 py-0.5 rounded-full text-xs font-medium bg-white/80 text-amber-700 border border-amber-200/50">0</span>
            </button>
            <button id="filterPENDINGBtn" class="order-status-btn shrink-0" data-status="PENDING_STATUS">
                <span class="w-2 h-2 rounded-full bg-teal-400"></span>
                Chờ xác nhận
                <span id="countPENDING" class="ml-1.5 px-1.5 py-0.5 rounded-full text-xs font-medium bg-white/80 text-teal-700 border border-teal-200/50">0</span>
            </button>
            <button id="filterCONFIRMEDBtn" class="order-status-btn shrink-0" data-status="CONFIRMED">
                <span class="w-2 h-2 rounded-full bg-orange-400"></span>
                Đã xác nhận
                <span id="countCONFIRMED" class="ml-1.5 px-1.5 py-0.5 rounded-full text-xs font-medium bg-white/80 text-orange-700 border border-orange-200/50">0</span>
            </button>
            <button id="filterPROCESSINGBtn" class="order-status-btn shrink-0" data-status="PROCESSING">
                <span class="w-2 h-2 rounded-full bg-purple-400"></span>
                Đang xử lý
                <span id="countPROCESSING" class="ml-1.5 px-1.5 py-0.5 rounded-full text-xs font-medium bg-white/80 text-purple-700 border border-purple-200/50">0</span>
            </button>
            <button id="filterSHIPPEDBtn" class="order-status-btn shrink-0" data-status="SHIPPED">
                <span class="w-2 h-2 rounded-full bg-slate-400"></span>
                Đang giao
                <span id="countSHIPPED" class="ml-1.5 px-1.5 py-0.5 rounded-full text-xs font-medium bg-white/80 text-slate-700 border border-slate-200/50">0</span>
            </button>
            <button id="filterDELIVEREDBtn" class="order-status-btn shrink-0" data-status="DELIVERED">
                <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
                Đã giao
                <span id="countDELIVERED" class="ml-1.5 px-1.5 py-0.5 rounded-full text-xs font-medium bg-white/80 text-emerald-700 border border-emerald-200/50">0</span>
            </button>
            <button id="filterCANCELLEDBtn" class="order-status-btn shrink-0" data-status="CANCELLED">
                <span class="w-2 h-2 rounded-full bg-rose-400"></span>
                Đã hủy
                <span id="countCANCELLED" class="ml-1.5 px-1.5 py-0.5 rounded-full text-xs font-medium bg-white/80 text-rose-700 border border-rose-200/50">0</span>
            </button>
            </div>
        </div>

        <style>
            /* Modern Status Filter Pills - Beige/Nâu Warm Tone */
            #orderStatusBar {
                background: linear-gradient(135deg, #fdf8f6, #f5f0eb);
                padding: 12px 16px;
                border-radius: 16px;
            }
            #orderStatusBar::-webkit-scrollbar {
                height: 4px;
            }
            #orderStatusBar::-webkit-scrollbar-track {
                background: #f1f1f1;
                border-radius: 4px;
            }
            #orderStatusBar::-webkit-scrollbar-thumb {
                background: #ccc;
                border-radius: 4px;
            }

            .order-status-btn {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 10px 18px;
                border-radius: 9999px;
                font-size: 13px;
                font-weight: 500;
                transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
                border: 2px solid transparent;
                background: white;
                color: #846358;
            }

            .order-status-btn:hover {
                background: #fff;
                color: #977669;
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(67, 48, 43, 0.12);
                border-color: #eaddd7;
            }

            /* Tất cả - Beige xám (mặc định) */
            .order-status-btn[data-status=""] {
                background: #f2e8e5;
                color: #846358;
                border-color: #eaddd7;
            }
            .order-status-btn[data-status=""]:hover {
                background: #eaddd7;
            }
            .order-status-btn.active[data-status=""] {
                background: linear-gradient(135deg, #a67c52, #866744);
                color: white;
                border-color: #866744;
                box-shadow: 0 4px 15px rgba(166, 124, 82, 0.4);
            }

            /* Chưa thanh toán - Nâu vàng nhạt */
            .order-status-btn[data-status="PENDING"]:not(.active) {
                background: #fef9f0;
                color: #a67c52;
                border-color: #f5e6cc;
            }
            .order-status-btn[data-status="PENDING"]:not(.active):hover {
                background: #fdf3e3;
                box-shadow: 0 4px 15px rgba(166, 124, 82, 0.25);
            }
            .order-status-btn.active[data-status="PENDING"] {
                background: linear-gradient(135deg, #d4a574, #c49a6c);
                color: white;
                border-color: #c49a6c;
                box-shadow: 0 4px 15px rgba(212, 165, 116, 0.45);
            }

            /* Chờ xác nhận - Beige xanh nhạt */
            .order-status-btn[data-status="PENDING_STATUS"]:not(.active) {
                background: #f0f7f7;
                color: #5a7a7a;
                border-color: #d4e5e5;
            }
            .order-status-btn[data-status="PENDING_STATUS"]:not(.active):hover {
                background: #e5f0f0;
                box-shadow: 0 4px 15px rgba(90, 122, 122, 0.2);
            }
            .order-status-btn.active[data-status="PENDING_STATUS"] {
                background: linear-gradient(135deg, #6b8e8e, #5a7a7a);
                color: white;
                border-color: #5a7a7a;
                box-shadow: 0 4px 15px rgba(90, 122, 122, 0.4);
            }

            /* Đã xác nhận - Nâu đỏ nhạt */
            .order-status-btn[data-status="CONFIRMED"]:not(.active) {
                background: #fdf2f0;
                color: #a07060;
                border-color: #f0ddd5;
            }
            .order-status-btn[data-status="CONFIRMED"]:not(.active):hover {
                background: #f9ebe5;
                box-shadow: 0 4px 15px rgba(160, 112, 96, 0.2);
            }
            .order-status-btn.active[data-status="CONFIRMED"] {
                background: linear-gradient(135deg, #a67c52, #8a6a4a);
                color: white;
                border-color: #8a6a4a;
                box-shadow: 0 4px 15px rgba(166, 124, 82, 0.4);
            }

            /* Đang xử lý - Nâu tím nhạt */
            .order-status-btn[data-status="PROCESSING"]:not(.active) {
                background: #f5f3f8;
                color: #7a6a8a;
                border-color: #e8e0f0;
            }
            .order-status-btn[data-status="PROCESSING"]:not(.active):hover {
                background: #ede8f5;
                box-shadow: 0 4px 15px rgba(122, 106, 138, 0.2);
            }
            .order-status-btn.active[data-status="PROCESSING"] {
                background: linear-gradient(135deg, #8a7a9a, #756888);
                color: white;
                border-color: #756888;
                box-shadow: 0 4px 15px rgba(138, 122, 154, 0.4);
            }

            /* Đang giao - Nâu xanh nhạt */
            .order-status-btn[data-status="SHIPPED"]:not(.active) {
                background: #f0f5f7;
                color: #5a7078;
                border-color: #d8e5ea;
            }
            .order-status-btn[data-status="SHIPPED"]:not(.active):hover {
                background: #e5eff3;
                box-shadow: 0 4px 15px rgba(90, 112, 120, 0.2);
            }
            .order-status-btn.active[data-status="SHIPPED"] {
                background: linear-gradient(135deg, #6a8088, #5a6f77);
                color: white;
                border-color: #5a6f77;
                box-shadow: 0 4px 15px rgba(106, 128, 136, 0.4);
            }

            /* Đã giao - Xanh lá be */
            .order-status-btn[data-status="DELIVERED"]:not(.active) {
                background: #f0f7f2;
                color: #5a7a62;
                border-color: #d8ebe0;
            }
            .order-status-btn[data-status="DELIVERED"]:not(.active):hover {
                background: #e5f3eb;
                box-shadow: 0 4px 15px rgba(90, 122, 98, 0.2);
            }
            .order-status-btn.active[data-status="DELIVERED"] {
                background: linear-gradient(135deg, #6a8a72, #5a7962);
                color: white;
                border-color: #5a7962;
                box-shadow: 0 4px 15px rgba(106, 138, 114, 0.4);
            }

            /* Đã hủy - Đỏ cam nhạt */
            .order-status-btn[data-status="CANCELLED"]:not(.active) {
                background: #fdf5f0;
                color: #a07050;
                border-color: #f0ddd0;
            }
            .order-status-btn[data-status="CANCELLED"]:not(.active):hover {
                background: #f9ebe0;
                box-shadow: 0 4px 15px rgba(160, 112, 80, 0.2);
            }
            .order-status-btn.active[data-status="CANCELLED"] {
                background: linear-gradient(135deg, #a07050, #8a5a40);
                color: white;
                border-color: #8a5a40;
                box-shadow: 0 4px 15px rgba(160, 112, 80, 0.4);
            }
        </style>

        <!-- Orders List -->
        <div id="ordersList" class="space-y-3"></div>
    </div>

    <!-- Order Detail Modal -->
    <div id="orderDetailModal" class="fixed inset-0 z-50 hidden">
        <div id="orderDetailBackdrop" class="absolute inset-0 bg-black/50"></div>
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="relative bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto my-auto">
                <div class="sticky top-0 bg-white border-b border-primary-100 px-6 py-4 flex items-center justify-between rounded-t-2xl z-10">
                    <h3 class="text-lg font-display font-semibold text-primary-800">Chi tiết đơn hàng</h3>
                    <button id="btnCloseOrderDetail" class="p-2 text-primary-400 hover:text-primary-600 rounded-lg hover:bg-primary-50">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <div id="orderDetailContent" class="p-6"></div>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="fixed inset-0 z-50 hidden">
        <div id="paymentBackdrop" class="absolute inset-0 bg-black/50"></div>
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="relative bg-white rounded-2xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto my-auto">
                <div class="sticky top-0 bg-white border-b border-primary-100 px-6 py-4 flex items-center justify-between rounded-t-2xl z-10">
                    <h3 class="text-lg font-display font-semibold text-primary-800">Thanh toán đơn hàng</h3>
                    <button id="btnClosePaymentModal" class="p-2 text-primary-400 hover:text-primary-600 rounded-lg hover:bg-primary-50">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <div id="paymentContent" class="p-6"></div>
            </div>
        </div>
    </div>

    <!-- Notification Modal -->
    <div id="notificationModal" class="fixed inset-0 z-50 hidden">
        <div id="notificationBackdrop" class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="relative bg-white rounded-2xl shadow-2xl max-w-md w-full transform transition-all">
                <div id="notificationContent" class="p-8 text-center">
                    <!-- Content will be injected dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- Cancel Confirm Modal -->
    <div id="cancelModal" class="fixed inset-0 z-50 hidden">
        <div id="cancelBackdrop" class="absolute inset-0 bg-black/50"></div>
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="relative bg-white rounded-2xl shadow-2xl max-w-md w-full my-auto">
                <div class="px-6 py-4 border-b border-primary-100">
                    <h3 class="text-lg font-display font-semibold text-primary-800">Xác nhận hủy đơn hàng</h3>
                </div>
                <div class="p-6">
                    <p class="text-sm text-primary-600 mb-4">Bạn có chắc chắn muốn hủy đơn hàng này không?</p>
                    <textarea id="cancelReason" class="w-full border border-primary-200 rounded-xl px-4 py-3 text-sm" rows="3" placeholder="Lý do hủy (tùy chọn)"></textarea>
                    <div class="flex justify-end gap-3 mt-4">
                        <button id="btnCloseCancelModal" class="px-4 py-2 border border-primary-300 text-primary-700 rounded-lg hover:bg-primary-50 text-sm">Đóng</button>
                        <button id="btnConfirmCancel" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 text-sm font-medium">Xác nhận hủy</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://pay.payos.vn/payos-checkout.js"></script>
    <script>
        // Đợi PayOS script load xong trước khi chạy code chính
        window.addEventListener('DOMContentLoaded', function() {
            // Kiểm tra PayOS đã load chưa
            if (typeof PayOSCheckout === 'undefined') {
                console.warn('PayOS script not loaded, will retry...');
                // Thử load lại sau 1 giây
                setTimeout(function() {
                    if (typeof PayOSCheckout === 'undefined') {
                        var script = document.createElement('script');
                        script.src = 'https://pay.payos.vn/payos-checkout.js';
                        document.head.appendChild(script);
                    }
                }, 1000);
            }
        });
    </script>
    <script>
        (function () {
            // Auth check
            function token() { return localStorage.getItem('accessToken'); }
            function authHeaders() {
                var t = token();
                var h = {'Content-Type': 'application/json'};
                if (t) h['Authorization'] = 'Bearer ' + t;
                return h;
            }
            async function api(url, method, body) {
                var res = await fetch(url, { method: method || 'GET', headers: authHeaders(), body: body ? JSON.stringify(body) : undefined });
                return res.json();
            }

            function formatVnd(v) {
                return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(Number(v) || 0);
            }
            function formatDate(dateStr) {
                if (!dateStr) return '';
                var d = new Date(dateStr);
                return d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
            }
            function formatDateTime(dateStr) {
                if (!dateStr) return '';
                var d = new Date(dateStr);
                return d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            }

            // Notification Modal Functions
            function showNotification(type, title, message, duration) {
                var modal = document.getElementById('notificationModal');
                var content = document.getElementById('notificationContent');
                var iconBg, iconColor, iconSvg;
                
                if (type === 'success') {
                    iconBg = 'bg-green-100';
                    iconColor = 'text-green-600';
                    iconSvg = '<svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
                } else if (type === 'info') {
                    iconBg = 'bg-blue-100';
                    iconColor = 'text-blue-600';
                    iconSvg = '<svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
                } else if (type === 'warning') {
                    iconBg = 'bg-amber-100';
                    iconColor = 'text-amber-600';
                    iconSvg = '<svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>';
                } else {
                    iconBg = 'bg-red-100';
                    iconColor = 'text-red-600';
                    iconSvg = '<svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
                }
                
                // Xây dựng HTML với cấu trúc đẹp hơn
                var html = '<div class="text-center">' +
                    '<div class="w-20 h-20 mx-auto rounded-full ' + iconBg + ' flex items-center justify-center mb-5 ' + iconColor + '">' +
                    iconSvg +
                    '</div>' +
                    '<h3 class="text-xl font-display font-bold text-primary-900 mb-3">' + (title || 'Thông báo') + '</h3>' +
                    '<p class="text-primary-600 text-sm leading-relaxed mb-6">' + (message || '') + '</p>' +
                    '<button class="w-full px-8 py-3 bg-gradient-to-r from-secondary-700 to-primary-800 text-white rounded-xl font-semibold text-sm hover:opacity-95 transition shadow-md">' +
                    'Đã hiểu' +
                    '</button>' +
                    '</div>';
                
                content.innerHTML = html;
                content.querySelector('button').addEventListener('click', function() {
                    modal.classList.add('hidden');
                });
                
                modal.classList.remove('hidden');
                
                if (duration) {
                    setTimeout(function() {
                        modal.classList.add('hidden');
                    }, duration);
                }
            }

            document.getElementById('notificationBackdrop')?.addEventListener('click', function() {
                document.getElementById('notificationModal')?.classList.add('hidden');
            });

            if (!token()) { window.location.href = '/login'; return; }

            // Kiểm tra URL params để hiển thị thông báo thanh toán
            var urlParams = new URLSearchParams(window.location.search);
            var paymentStatus = urlParams.get('payment');
            if (paymentStatus === 'success') {
                showNotification(
                    'success',
                    'Thanh toán thành công!',
                    'Cảm ơn bạn đã mua sắm tại NTFurniture. Đơn hàng của bạn đang được xử lý và sẽ được giao đến bạn sớm nhất có thể.'
                );
                window.history.replaceState({}, document.title, '/orders');
                loadOrders();
            } else if (paymentStatus === 'cancelled') {
                showNotification(
                    'info',
                    'Đã hủy thanh toán',
                    'Bạn đã hủy thanh toán. Không sao cả! Bạn có thể quay lại và thanh toán bất cứ khi nào bạn sẵn sàng.'
                );
                window.history.replaceState({}, document.title, '/orders');
                // Reset PayOS payment để user có thể chọn lại phương thức thanh toán
                resetPayOSForCurrentOrders();
                loadOrders();
            }

            var allOrders = [];
            var currentStatusFilter = '';
            var currentOrderId = null;
            var payOSConfig = null;
            var payOSInstance = null;

            // Reset PayOS payment cho các đơn hàng chưa thanh toán
            async function resetPayOSForCurrentOrders() {
                try {
                    for (var i = 0; i < allOrders.length; i++) {
                        var order = allOrders[i];
                        // Chỉ reset cho các đơn hàng chưa thanh toán và có PayOS order code
                        if (order.paymentStatus === 'PENDING' && 
                            order.status !== 'CANCELLED' && 
                            order.paymentMethod === 'PAYTOS' && 
                            order.payosOrderCode) {
                            try {
                                await api('/api/payment/payos/reset/' + order.id, 'POST');
                                log.info('Reset PayOS for order:', order.id);
                            } catch (e) {
                                log.warn('Could not reset PayOS for order:', order.id, e);
                            }
                        }
                    }
                } catch (e) {
                    console.warn('Error resetting PayOS payments:', e);
                }
            }

            // Load orders
            async function loadOrders() {
                console.log('Loading orders...');
                var r = await api('/api/customer/orders');
                console.log('Orders API response:', r);
                if (!r.success || !r.data) { 
                    console.log('No orders found or API error');
                    allOrders = []; 
                } else { 
                    allOrders = r.data; 
                    console.log('Loaded', allOrders.length, 'orders');
                }
                updateOrderCounts();
                renderOrders();
            }

            // Cập nhật số lượng đơn hàng trên các tab
            function updateOrderCounts() {
                document.getElementById('countAll').textContent = allOrders.length;
                document.getElementById('countUNPAID').textContent = allOrders.filter(function(o) { return o.paymentStatus === 'PENDING' && o.status !== 'CANCELLED'; }).length;
                document.getElementById('countPENDING').textContent = allOrders.filter(function(o) { return o.status === 'PENDING'; }).length;
                document.getElementById('countCONFIRMED').textContent = allOrders.filter(function(o) { return o.status === 'CONFIRMED'; }).length;
                document.getElementById('countPROCESSING').textContent = allOrders.filter(function(o) { return o.status === 'PROCESSING'; }).length;
                document.getElementById('countSHIPPED').textContent = allOrders.filter(function(o) { return o.status === 'SHIPPED'; }).length;
                document.getElementById('countDELIVERED').textContent = allOrders.filter(function(o) { return o.status === 'DELIVERED'; }).length;
                document.getElementById('countCANCELLED').textContent = allOrders.filter(function(o) { return o.status === 'CANCELLED'; }).length;
            }

            function renderOrders() {
                var box = document.getElementById('ordersList');
                var filtered = allOrders;

                if (currentStatusFilter === 'PENDING') {
                    filtered = allOrders.filter(function(o) { return o.paymentStatus === 'PENDING' && o.status !== 'CANCELLED'; });
                } else if (currentStatusFilter === 'PENDING_STATUS') {
                    filtered = allOrders.filter(function(o) { return o.status === 'PENDING'; });
                } else if (currentStatusFilter) {
                    filtered = allOrders.filter(function(o) { return o.status === currentStatusFilter; });
                }

                if (!filtered.length) {

                        '<div class="bg-primary-50 rounded-xl p-4">' +
                        '<div class="flex justify-between mb-2"><span class="text-primary-600">Mã đơn</span><span class="font-semibold">' + (order.orderNumber || order.id) + '</span></div>' +
                        '<div class="flex justify-between font-bold text-lg"><span>Tổng tiền</span><span class="text-primary-900">' + formatVnd(order.totalAmount) + '</span></div>' +
                        '</div>' +
                        addressHtml +
                        statusHtml +
                        '<div class="flex gap-3 pt-4 border-t border-primary-100">' +
                        '<button id="btnCancelPayment" class="flex-1 py-3 bg-gradient-to-r from-secondary-700 to-primary-800 text-white rounded-xl font-semibold text-sm hover:opacity-95 transition shadow-md">' +
                        'Đóng' +
                        '</button>' +
                        '</div>' +
                        '</div>';
                    document.getElementById('paymentModal').classList.remove('hidden');
                    document.getElementById('btnCancelPayment').addEventListener('click', function() {
                        window.closePaymentModal();
                    });
                    return;
                }

                // Chưa xác nhận COD → cho phép chọn phương thức
                document.getElementById('paymentContent').innerHTML =
                    '<div class="space-y-4">' +
                    '<div class="bg-primary-50 rounded-xl p-4">' +
                    '<div class="flex justify-between mb-2"><span class="text-primary-600">Mã đơn</span><span class="font-semibold">' + (order.orderNumber || order.id) + '</span></div>' +
                    '<div class="flex justify-between font-bold text-lg"><span>Tổng tiền</span><span class="text-primary-900">' + formatVnd(order.totalAmount) + '</span></div>' +
                    '</div>' +
                    addressHtml +
                    statusHtml +
                    '<div class="space-y-3">' +
                    '<p class="text-sm font-medium text-primary-700">Chọn phương thức thanh toán:</p>' +
                    '<div id="paymentMethods" class="space-y-2">' +
                    '<label class="flex items-center gap-3 p-4 border border-primary-200 rounded-xl cursor-pointer hover:bg-primary-50 transition payment-method-option' + (currentMethod === 'PAYTOS' ? ' border-primary-500 bg-primary-50' : '') + '" data-method="PAYTOS">' +
                    '<input type="radio" name="paymentMethod" value="PAYTOS" class="text-primary-600"' + (currentMethod === 'PAYTOS' ? ' checked' : '') + '>' +
                    '<div class="flex-1">' +
                    '<span class="font-medium text-primary-800">Thanh toán qua PayOS (QR)</span>' +
                    '<p class="text-xs text-primary-500 mt-0.5">Quét mã QR để thanh toán bằng thẻ, ví điện tử</p>' +
                    '</div>' +
                    '<div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center">' +
                    '<svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>' +
                    '</div>' +
                    '</label>' +
                    '<label class="flex items-center gap-3 p-4 border border-primary-200 rounded-xl cursor-pointer hover:bg-primary-50 transition payment-method-option' + (currentMethod === 'COD' ? ' border-primary-500 bg-primary-50' : '') + '" data-method="COD">' +
                    '<input type="radio" name="paymentMethod" value="COD" class="text-primary-600"' + (currentMethod === 'COD' ? ' checked' : '') + '>' +
                    '<div class="flex-1">' +
                    '<span class="font-medium text-primary-800">Thanh toán khi nhận hàng (COD)</span>' +
                    '<p class="text-xs text-primary-500 mt-0.5">Trả tiền mặt cho nhân viên giao hàng</p>' +
                    '</div>' +
                    '<div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center">' +
                    '<svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>' +
                    '</div>' +
                    '</label>' +
                    '</div>' +
                    '</div>' +
                    '<div id="codContainer" class="hidden">' +
                    '<div class="bg-green-50 border-2 border-green-200 rounded-xl p-4 text-center">' +
                    '<svg class="w-8 h-8 mx-auto text-green-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>' +
                    '<p class="text-sm font-medium text-green-700">Thanh toán khi nhận hàng (COD)</p>' +
                    '<p class="text-xs text-green-600 mt-1">Bạn sẽ thanh toán khi nhận được hàng</p>' +
                    '</div>' +
                    '</div>' +
                    '<div class="flex gap-3 pt-4 border-t border-primary-100">' +
                    '<button id="btnCancelPayment" class="px-4 py-3 border border-primary-300 text-primary-700 rounded-xl font-medium text-sm hover:bg-primary-50 transition">' +
                    'Đóng' +
                    '</button>' +
                    '<button id="btnProcessPayment" class="flex-1 py-3 bg-gradient-to-r from-secondary-700 to-primary-800 text-white rounded-xl font-semibold text-sm hover:opacity-95 active:scale-[0.98] transition shadow-md">' +
                    'Xác nhận thanh toán' +
                    '</button>' +
                    '</div>' +
                    '</div>';
                document.getElementById('paymentModal').classList.remove('hidden');

                document.getElementById('btnCancelPayment').addEventListener('click', function() {
                    window.closePaymentModal();
                });

                document.querySelectorAll('input[name="paymentMethod"]').forEach(function(radio) {
                    radio.addEventListener('change', function() {
                        document.querySelectorAll('.payment-method-option').forEach(function(opt) {
                            opt.classList.remove('border-primary-500', 'bg-primary-50');
                        });
                        this.closest('.payment-method-option').classList.add('border-primary-500', 'bg-primary-50');
                        document.getElementById('codContainer').classList.add('hidden');
                    });
                });

                document.getElementById('btnProcessPayment').addEventListener('click', async function() {
                    var method = document.querySelector('input[name="paymentMethod"]:checked')?.value;
                    if (!method) {
                        showNotification('warning', 'Vui lòng chọn phương thức', 'Bạn cần chọn một phương thức thanh toán trước khi tiếp tục.');
                        return;
                    }
                    var btn = this;

                    if (method === 'COD') {
                        btn.disabled = true;
                        btn.innerHTML = '<span class="opacity-75">Đang xử lý...</span>';
                        try {
                            var r = await api('/api/payment/cod', 'POST', { orderId: currentOrderId });
                            if (r.success) {
                                showNotification(
                                    'success',
                                    'Xác nhận thành công!',
                                    'Bạn đã chọn thanh toán COD (nhận hàng trả tiền). Đơn hàng của bạn sẽ được xử lý và giao đến bạn sớm nhất có thể.'
                                );
                                document.getElementById('paymentModal').classList.add('hidden');
                                await loadOrders();
                            } else {
                                showNotification('error', 'Có lỗi xảy ra', r.message || 'Không thể xác nhận thanh toán. Vui lòng thử lại.');
                            }
                        } catch (e) {
                            console.error('COD payment error:', e);
                            showNotification('error', 'Có lỗi xảy ra', 'Đã xảy ra lỗi kết nối. Vui lòng kiểm tra mạng và thử lại.');
                        }
                        btn.disabled = false;
                        btn.innerHTML = 'Xác nhận thanh toán';
                    } else if (method === 'PAYTOS') {
                        btn.innerHTML = '<span>Đang chuyển đến cổng thanh toán...</span>';
                        btn.disabled = true;

                        try {
                            var createResult = await api('/api/payment/payos/create-link', 'POST', {
                                orderId: currentOrderId
                            });

                            if (!createResult.success || !createResult.data.checkoutUrl) {
                                showNotification('warning', 'Không thể tạo liên kết', createResult.message || 'Không thể kết nối đến cổng thanh toán PayOS. Vui lòng thử lại sau hoặc chọn phương thức COD.');
                                btn.disabled = false;
                                btn.innerHTML = 'Xác nhận thanh toán';
                                return;
                            }

                            var checkoutUrl = createResult.data.checkoutUrl;
                            var expiresAt = createResult.data.expiresAt;
                            var expiryTimeStr = createResult.data.expiryTimeStr || '10 phút';

                            document.getElementById('paymentModal').classList.add('hidden');

                            var expiryTimestamp = expiresAt || (Date.now() + 600000);
                            var overlay = document.createElement('div');
                            overlay.id = 'payos-redirect-overlay';
                            overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:9999;';

                            var countdownInterval;
                            function updateCountdown() {
                                var now = Date.now();
                                var remaining = Math.max(0, Math.floor((expiryTimestamp * 1000 - now) / 1000));
                                var mins = Math.floor(remaining / 60);
                                var secs = remaining % 60;
                                return mins + ' phút ' + (secs < 10 ? '0' : '') + secs + ' giây';
                            }

                            overlay.innerHTML = '<div style="background:white;border-radius:16px;padding:32px;text-align:center;max-width:400px;margin:16px;">' +
                                '<div style="width:48px;height:48px;border:4px solid #a67c52;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;"></div>' +
                                '<h3 style="font-size:20px;font-weight:600;margin:0 0 12px;color:#43302b;">Đang chuyển đến PayOS</h3>' +
                                '<p style="color:#666;font-size:15px;margin:0 0 16px;">Vui lòng thanh toán trong <strong id="payos-countdown" style="color:#a67c52;font-size:18px;">' + updateCountdown() + '</strong></p>' +
                                '<p style="color:#888;font-size:13px;">Hạn thanh toán: ' + expiryTimeStr + '</p>' +
                                '</div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
                            document.body.appendChild(overlay);

                            countdownInterval = setInterval(function() {
                                var cdEl = document.getElementById('payos-countdown');
                                if (cdEl) {
                                    cdEl.textContent = updateCountdown();
                                } else {
                                    clearInterval(countdownInterval);
                                }
                            }, 1000);

                            setTimeout(function() {
                                clearInterval(countdownInterval);
                                window.location.href = checkoutUrl;
                            }, 1500);

                        } catch (err) {
                            console.error('PayOS error:', err);
                            showNotification('warning', 'Giao dịch không thành công', 'Không thể kết nối đến cổng thanh toán. Vui lòng thử lại sau hoặc chọn phương thức COD.');
                            btn.disabled = false;
                            btn.innerHTML = 'Xác nhận thanh toán';
                        }
                    }
                });
            };

            window.closePaymentModal = function() {
                document.getElementById('paymentModal').classList.add('hidden');
            };

            document.getElementById('btnClosePaymentModal').addEventListener('click', window.closePaymentModal);
            document.getElementById('paymentBackdrop').addEventListener('click', window.closePaymentModal);

            // Cancel modal
            window.openCancelModal = function(orderId) {
                currentOrderId = orderId;
                document.getElementById('cancelModal').classList.remove('hidden');
            };

            document.getElementById('btnCloseCancelModal').addEventListener('click', function() {
                document.getElementById('cancelModal').classList.add('hidden');
            });
            document.getElementById('cancelBackdrop').addEventListener('click', function() {
                document.getElementById('cancelModal').classList.add('hidden');
            });

            document.getElementById('btnConfirmCancel').addEventListener('click', async function() {
                var reason = document.getElementById('cancelReason').value;
                var btn = this;
                btn.disabled = true;
                btn.innerText = 'Đang hủy...';

                try {
                    // Gọi API hủy đơn hàng (orderId nằm trong URL)
                    var r = await api('/api/customer/orders/' + currentOrderId + '/cancel', 'POST');
                    if (r.success) {
                        alert('Đã hủy đơn hàng thành công!');
                        document.getElementById('cancelModal').classList.add('hidden');
                        await loadOrders();
                    } else {
                        alert(r.message || 'Không thể hủy đơn hàng');
                    }
                } catch (e) {
                    console.error('Cancel error:', e);
                    alert('Có lỗi xảy ra. Vui lòng thử lại.');
                }
                btn.disabled = false;
                btn.innerText = 'Xác nhận hủy';
            });

            // Init
            loadOrders();
        })();
    </script>
</th:block>
