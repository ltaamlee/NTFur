<th:block th:fragment="page-content">
    <th:block th:with="title='Sản phẩm', pageTitle='Sản phẩm', activePage='products'">

    <!-- Page Header -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6">
        <div>
            <h2 class="text-2xl font-display font-bold text-primary-800">Danh sách sản phẩm</h2>
            <p class="text-primary-500 mt-1">Xem và tìm kiếm sản phẩm</p>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-2xl card-shadow border border-primary-100 p-4 mb-6">
        <div class="flex flex-col md:flex-row gap-4">
            <div class="flex-1">
                <input type="text" id="searchInput" placeholder="Tìm kiếm sản phẩm..." class="w-full px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500">
            </div>
            <select id="filterCategory" class="px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500">
                <option value="">Tất cả danh mục</option>
            </select>
            <select id="filterStatus" class="px-4 py-2 border border-primary-200 rounded-lg focus:border-primary-500">
                <option value="">Tất cả trạng thái</option>
                <option value="ACTIVE">Hoạt động</option>
                <option value="OUT_OF_STOCK">Hết hàng</option>
                <option value="DISCONTINUED">Ngừng bán</option>
            </select>
        </div>
    </div>

    <!-- Products Table -->
    <div class="bg-white rounded-2xl card-shadow border border-primary-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full" id="productsTableSortable">
                <thead>
                    <tr class="table-header">
                        <th class="px-6 py-4 text-left text-xs font-semibold text-primary-700 uppercase tracking-wider" data-sortable data-sort="name">Sản phẩm</th>
                        <th class="px-6 py-4 text-center text-xs font-semibold text-primary-700 uppercase tracking-wider" data-sortable data-sort="category">Danh mục</th>
                        <th class="px-6 py-4 text-right text-xs font-semibold text-primary-700 uppercase tracking-wider" data-sortable data-sort="price">Giá</th>
                        <th class="px-6 py-4 text-center text-xs font-semibold text-primary-700 uppercase tracking-wider" data-sortable data-sort="stock">Tồn kho</th>
                        <th class="px-6 py-4 text-center text-xs font-semibold text-primary-700 uppercase tracking-wider" data-sortable data-sort="status">Trạng thái</th>
                        <th class="px-6 py-4 text-center text-xs font-semibold text-primary-700 uppercase tracking-wider">Hành động</th>
                    </tr>
                </thead>
                <tbody id="productsTable">
                    <tr>
                        <td colspan="6" class="px-6 py-12 text-center text-primary-500">Đang tải dữ liệu...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let allProducts = [];
        
        async function loadProducts() {
            try {
                const response = await apiCall('/api/admin/products');
                if (response.success) {
                    allProducts = response.data || [];
                    renderProducts();
                }
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }
        
        async function loadCategories() {
            try {
                const response = await apiCall('/api/admin/categories');
                if (response.success) {
                    const select = document.getElementById('filterCategory');
                    select.innerHTML = '<option value="">Tất cả danh mục</option>';
                    response.data.forEach(cat => {
                        select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
                    });
                }
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }
        
        function renderProducts() {
            const tbody = document.getElementById('productsTable');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('filterCategory').value;
            const statusFilter = document.getElementById('filterStatus').value;
            
            let filtered = allProducts.filter(p => {
                const matchSearch = !searchTerm || 
                    (p.name && p.name.toLowerCase().includes(searchTerm)) ||
                    (p.sku && p.sku.toLowerCase().includes(searchTerm));
                const matchCategory = !categoryFilter || p.categoryId == categoryFilter;
                const matchStatus = !statusFilter || p.status === statusFilter;
                return matchSearch && matchCategory && matchStatus;
            });
            
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-12 text-center text-primary-500">Không tìm thấy sản phẩm nào</td></tr>';
                return;
            }
            
            tbody.innerHTML = filtered.map(product => `
                <tr class="border-b border-primary-50 hover:bg-primary-50/50">
                    <td class="px-6 py-4">
                        <div class="flex items-center">
                            <div class="w-12 h-12 rounded-lg overflow-hidden bg-primary-100 flex-shrink-0">
                                ${product.mainImage 
                                    ? `<img src="${product.mainImage}" alt="${product.name}" class="w-full h-full object-cover">`
                                    : `<div class="w-full h-full flex items-center justify-center text-primary-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div>`
                                }
                            </div>
                            <div class="ml-4">
                                <p class="text-sm font-medium text-primary-800">${product.name || ''}</p>
                                <p class="text-xs text-primary-400">${product.sku || 'Không có SKU'}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-center text-sm text-primary-600">${product.categoryName || '-'}</td>
                    <td class="px-6 py-4 text-right text-sm font-semibold text-primary-800">${formatCurrency(product.price)}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-3 py-1 rounded-full text-sm ${product.stock > 10 ? 'bg-green-100 text-green-700' : product.stock > 0 ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'}">${product.stock || 0}</span>
                    </td>
                    <td class="px-6 py-4 text-center">${getStatusBadge(product.status)}</td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="viewProduct(${product.id})" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg" title="Xem chi tiết">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        function getStatusBadge(status) {
            const statusMap = {
                'ACTIVE': '<span class="status-badge bg-green-100 text-green-700">Hoạt động</span>',
                'OUT_OF_STOCK': '<span class="status-badge bg-red-100 text-red-700">Hết hàng</span>',
                'DISCONTINUED': '<span class="status-badge bg-gray-100 text-gray-600">Ngừng bán</span>'
            };
            return statusMap[status] || `<span class="status-badge bg-gray-100 text-gray-600">${status}</span>`;
        }
        
        function viewProduct(id) {
            const product = allProducts.find(p => p.id === id);
            if (!product) return;
            
            alert(`Sản phẩm: ${product.name}\nGiá: ${formatCurrency(product.price)}\nTồn kho: ${product.stock}\nDanh mục: ${product.categoryName || '-'}\nMô tả: ${product.description || 'Không có'}`);
        }
        
        // Event listeners
        document.getElementById('searchInput').addEventListener('input', renderProducts);
        document.getElementById('filterCategory').addEventListener('change', renderProducts);
        document.getElementById('filterStatus').addEventListener('change', renderProducts);
        
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
            loadCategories();
            initTableSort('productsTableSortable');
        });
    </script>
    </th:block>
</th:block>
