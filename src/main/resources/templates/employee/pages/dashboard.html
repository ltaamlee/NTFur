<th:block th:fragment="page-content">
    <th:block th:with="title='Tổng quan', pageTitle='Tổng quan', activePage='dashboard'">

    <!-- Stats Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <div class="stat-card rounded-2xl p-6 card-shadow border border-primary-100">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-primary-500 text-sm font-medium">Đơn hàng mới</p>
                    <p class="text-3xl font-display font-bold text-primary-800 mt-2" id="newOrdersCount">0</p>
                </div>
                <div class="w-14 h-14 bg-blue-100 rounded-xl flex items-center justify-center">
                    <svg class="w-7 h-7 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                </div>
            </div>
        </div>
        <div class="stat-card rounded-2xl p-6 card-shadow border border-primary-100">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-primary-500 text-sm font-medium">Đang xử lý</p>
                    <p class="text-3xl font-display font-bold text-primary-800 mt-2" id="processingCount">0</p>
                </div>
                <div class="w-14 h-14 bg-yellow-100 rounded-xl flex items-center justify-center">
                    <svg class="w-7 h-7 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                </div>
            </div>
        </div>
        <div class="stat-card rounded-2xl p-6 card-shadow border border-primary-100">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-primary-500 text-sm font-medium">Sản phẩm</p>
                    <p class="text-3xl font-display font-bold text-primary-800 mt-2" id="productsCount">0</p>
                </div>
                <div class="w-14 h-14 bg-green-100 rounded-xl flex items-center justify-center">
                    <svg class="w-7 h-7 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                </div>
            </div>
        </div>
        <div class="stat-card rounded-2xl p-6 card-shadow border border-primary-100">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-primary-500 text-sm font-medium">Phiếu nhập hàng</p>
                    <p class="text-3xl font-display font-bold text-primary-800 mt-2" id="importReceiptsCount">0</p>
                </div>
                <div class="w-14 h-14 bg-purple-100 rounded-xl flex items-center justify-center">
                    <svg class="w-7 h-7 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/></svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Recent Orders & Quick Actions -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Recent Orders -->
        <div class="lg:col-span-2 bg-white rounded-2xl card-shadow border border-primary-100 overflow-hidden">
            <div class="px-6 py-4 border-b border-primary-100 flex items-center justify-between">
                <h3 class="font-display font-semibold text-primary-800">Đơn hàng gần đây</h3>
                <a href="/employee/orders" class="text-sm text-secondary-600 hover:text-secondary-800">Xem tất cả</a>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="table-header">
                            <th class="px-6 py-3 text-left text-xs font-semibold text-primary-700 uppercase tracking-wider">Mã đơn</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-primary-700 uppercase tracking-wider">Khách hàng</th>
                            <th class="px-6 py-3 text-right text-xs font-semibold text-primary-700 uppercase tracking-wider">Tổng tiền</th>
                            <th class="px-6 py-3 text-center text-xs font-semibold text-primary-700 uppercase tracking-wider">Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody id="recentOrdersTable">
                        <tr>
                            <td colspan="4" class="px-6 py-8 text-center text-primary-500">Đang tải...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="bg-white rounded-2xl card-shadow border border-primary-100 p-6">
            <h3 class="font-display font-semibold text-primary-800 mb-4">Thao tác nhanh</h3>
            <div class="space-y-3">
                <a href="/employee/import" class="flex items-center p-4 bg-gradient-to-r from-purple-50 to-secondary-50 rounded-xl hover:from-purple-100 hover:to-secondary-100 transition-all">
                    <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center mr-3">
                        <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/></svg>
                    </div>
                    <div>
                        <p class="font-medium text-primary-800">Tạo phiếu nhập hàng</p>
                        <p class="text-xs text-primary-500">Nhập hàng từ nhà cung cấp</p>
                    </div>
                </a>
                <a href="/employee/orders" class="flex items-center p-4 bg-gradient-to-r from-blue-50 to-primary-50 rounded-xl hover:from-blue-100 hover:to-primary-100 transition-all">
                    <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center mr-3">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    </div>
                    <div>
                        <p class="font-medium text-primary-800">Xử lý đơn hàng</p>
                        <p class="text-xs text-primary-500">Cập nhật trạng thái đơn</p>
                    </div>
                </a>
                <a href="/employee/shipping" class="flex items-center p-4 bg-gradient-to-r from-green-50 to-emerald-50 rounded-xl hover:from-green-100 hover:to-emerald-100 transition-all">
                    <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center mr-3">
                        <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-2"/></svg>
                    </div>
                    <div>
                        <p class="font-medium text-primary-800">Quản lý vận chuyển</p>
                        <p class="text-xs text-primary-500">Theo dõi giao hàng</p>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <script>
        async function loadDashboardData() {
            try {
                // Load orders
                const ordersRes = await apiCall('/api/admin/orders');
                if (ordersRes.success) {
                    const orders = ordersRes.data || [];
                    
                    // Count by status
                    let newOrders = 0, processing = 0;
                    orders.forEach(o => {
                        if (o.status === 'PENDING') newOrders++;
                        if (['CONFIRMED', 'PROCESSING', 'SHIPPING'].includes(o.status)) processing++;
                    });
                    
                    document.getElementById('newOrdersCount').textContent = newOrders;
                    document.getElementById('processingCount').textContent = processing;
                    
                    // Recent orders
                    const recentOrders = orders.slice(0, 5);
                    const tbody = document.getElementById('recentOrdersTable');
                    if (recentOrders.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-primary-500">Chưa có đơn hàng nào</td></tr>';
                    } else {
                        tbody.innerHTML = recentOrders.map(order => `
                            <tr class="border-b border-primary-50 hover:bg-primary-50/50">
                                <td class="px-6 py-3 text-sm font-medium text-primary-800">${order.orderNumber || order.id}</td>
                                <td class="px-6 py-3 text-sm text-primary-600">${order.customerName || 'Khách hàng'}</td>
                                <td class="px-6 py-3 text-sm text-right font-semibold text-primary-800">${formatCurrency(order.totalAmount || 0)}</td>
                                <td class="px-6 py-3 text-center">${getStatusBadge(order.status)}</td>
                            </tr>
                        `).join('');
                    }
                }
                
                // Load products count
                const productsRes = await apiCall('/api/admin/products');
                if (productsRes.success) {
                    document.getElementById('productsCount').textContent = (productsRes.data || []).length;
                }
                
                // Load import receipts count
                const importRes = await apiCall('/api/admin/import-receipts');
                if (importRes.success) {
                    document.getElementById('importReceiptsCount').textContent = (importRes.data || []).length;
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }
        
        function getStatusBadge(status) {
            const statusMap = {
                'PENDING': '<span class="status-badge status-pending">Chờ</span>',
                'CONFIRMED': '<span class="status-badge status-confirmed">Đã xác nhận</span>',
                'PROCESSING': '<span class="status-badge status-processing">Xử lý</span>',
                'SHIPPING': '<span class="status-badge status-shipped">Giao hàng</span>',
                'DELIVERED': '<span class="status-badge status-delivered">Hoàn thành</span>',
                'CANCELLED': '<span class="status-badge status-cancelled">Đã hủy</span>'
            };
            return statusMap[status] || `<span class="status-badge bg-gray-100 text-gray-600">${status}</span>`;
        }
        
        document.addEventListener('DOMContentLoaded', loadDashboardData);
    </script>
    </th:block>
</th:block>
