<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - NTFurniture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 500px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group label span {
            color: #ff4444;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-group input.error {
            border-color: #ff4444;
        }

        .password-requirements {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
        }

        .btn-register {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .terms {
            margin: 20px 0;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .terms input[type="checkbox"] {
            margin-top: 4px;
            width: 18px;
            height: 18px;
            accent-color: #667eea;
        }

        .terms label {
            font-size: 0.9rem;
            color: #666;
        }

        .terms a {
            color: #667eea;
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
        }

        .login-link p {
            color: #666;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .alert-info {
            background: #eef;
            color: #33c;
            border: 1px solid #ccf;
        }

        .alert-show {
            display: block;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <h1>NTFurniture</h1>
            <p>Tạo tài khoản mới</p>
        </div>

        <div id="alertError" class="alert alert-error"></div>
        <div id="alertSuccess" class="alert alert-success"></div>
        <div id="alertInfo" class="alert alert-info"></div>

        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="username">Tên đăng nhập <span>*</span></label>
                    <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required minlength="3" maxlength="50">
                </div>

                <div class="form-group">
                    <label for="fullName">Họ và tên</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Nhập họ và tên">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email <span>*</span></label>
                <input type="email" id="email" name="email" placeholder="Nhập địa chỉ email" required>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <input type="tel" id="phone" name="phone" placeholder="Nhập số điện thoại">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Mật khẩu <span>*</span></label>
                    <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required minlength="8">
                    <p class="password-requirements">Ít nhất 8 ký tự, bao gồm chữ hoa, chữ thường và số</p>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Xác nhận mật khẩu <span>*</span></label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                </div>
            </div>

            <div class="terms">
                <input type="checkbox" id="agreeTerms" required>
                <label for="agreeTerms">
                    Tôi đồng ý với <a href="#">Điều khoản dịch vụ</a> và <a href="#">Chính sách bảo mật</a>
                </label>
            </div>

            <button type="submit" class="btn-register" id="btnRegister">
                Đăng ký
            </button>
        </form>

        <div class="login-link">
            <p>Đã có tài khoản? <a href="/auth/login">Đăng nhập ngay</a></p>
        </div>
    </div>

    <script>
        // Hiển thị thông báo
        function showAlert(type, message) {
            document.querySelectorAll('.alert').forEach(el => el.classList.remove('alert-show'));
            const alertEl = document.getElementById('alert' + type.charAt(0).toUpperCase() + type.slice(1));
            alertEl.textContent = message;
            alertEl.classList.add('alert-show');
            setTimeout(() => alertEl.classList.remove('alert-show'), 10000);
        }

        // Kiểm tra mật khẩu
        function validatePassword(password) {
            const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[a-zA-Z\d]{8,}$/;
            return regex.test(password);
        }

        // Xử lý form đăng ký
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btnRegister');
            btn.classList.add('loading');
            btn.innerHTML = '<span class="spinner"></span>Đang đăng ký...';

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Kiểm tra mật khẩu
            if (password !== confirmPassword) {
                showAlert('error', 'Mật khẩu xác nhận không khớp!');
                btn.classList.remove('loading');
                btn.innerHTML = 'Đăng ký';
                return;
            }

            if (!validatePassword(password)) {
                showAlert('error', 'Mật khẩu phải có ít nhất 8 ký tự, bao gồm chữ hoa, chữ thường và số!');
                btn.classList.remove('loading');
                btn.innerHTML = 'Đăng ký';
                return;
            }

            const formData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: password,
                confirmPassword: confirmPassword,
                fullName: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value
            };

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('success', data.message || 'Đăng ký thành công! Vui lòng kiểm tra email để xác thực tài khoản.');
                    btn.classList.remove('loading');
                    btn.innerHTML = 'Đăng ký thành công!';
                    btn.disabled = true;
                    
                    // Chuyển hướng sau 3 giây
                    setTimeout(() => {
                        window.location.href = '/auth/login';
                    }, 3000);
                } else {
                    showAlert('error', data.message || 'Đăng ký thất bại!');
                    btn.classList.remove('loading');
                    btn.innerHTML = 'Đăng ký';
                }
            } catch (error) {
                showAlert('error', 'Có lỗi xảy ra. Vui lòng thử lại!');
                btn.classList.remove('loading');
                btn.innerHTML = 'Đăng ký';
            }
        });

        // Kiểm tra username đã tồn tại chưa
        document.getElementById('username').addEventListener('blur', async function() {
            const username = this.value;
            if (username.length < 3) return;

            try {
                const response = await fetch(`/api/auth/check-username?username=${username}`);
                const data = await response.json();
                if (data.exists) {
                    this.classList.add('error');
                    showAlert('error', 'Tên đăng nhập đã được sử dụng!');
                } else {
                    this.classList.remove('error');
                }
            } catch (error) {
                console.log('Error checking username');
            }
        });

        // Kiểm tra email đã tồn tại chưa
        document.getElementById('email').addEventListener('blur', async function() {
            const email = this.value;
            if (!email || !email.includes('@')) return;

            try {
                const response = await fetch(`/api/auth/check-email?email=${email}`);
                const data = await response.json();
                if (data.exists) {
                    this.classList.add('error');
                    showAlert('error', 'Email đã được sử dụng!');
                } else {
                    this.classList.remove('error');
                }
            } catch (error) {
                console.log('Error checking email');
            }
        });
    </script>
</body>
</html>
